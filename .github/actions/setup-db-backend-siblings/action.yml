name: Setup db-backend siblings
description: Clone sibling repositories required by src/db-backend path dependencies.
inputs:
  gh-token:
    description: GitHub token with access to sibling repositories.
    required: true
runs:
  using: composite
  steps:
    - name: Checkout metacraft-manifests (workspace locks)
      uses: actions/checkout@v5
      with:
        repository: metacraft-labs/metacraft-manifests
        ref: latest
        path: _manifests
        token: ${{ inputs.gh-token }}

    - name: Resolve cross-repo workspace-lock SHA
      shell: bash
      run: |
        case "${{ github.event_name }}" in
          pull_request) CANDS="${{ github.event.pull_request.base.sha }}" ;;
          push) CANDS="${{ github.sha }} ${{ github.event.before }}" ;;
          *) CANDS="${{ github.sha }}" ;;
        esac
        LOCK_SHA=""
        for c in $CANDS; do
          [ -z "$c" ] && continue
          [ "$c" = "0000000000000000000000000000000000000000" ] && continue
          if "${{ github.workspace }}/scripts/resolve-sibling-rev.sh" \
               --repo codetracer --sibling codetracer-trace-format \
               --manifest-dir "${{ github.workspace }}/_manifests" \
               --sha "$c" --no-walk >/dev/null 2>&1; then
            LOCK_SHA="$c"; break
          fi
        done
        if [ -z "$LOCK_SHA" ]; then
          echo "::error::No repo-workspaces workspace lock for codetracer (candidates: $CANDS). The commit must be published through the workspace tooling (pre-push hook / 'workspace lock')."
          exit 1
        fi
        echo "CT_MANIFEST_DIR=${{ github.workspace }}/_manifests" >> "$GITHUB_ENV"
        echo "CT_LOCK_SHA=$LOCK_SHA" >> "$GITHUB_ENV"
        echo "Resolved cross-repo lock SHA for codetracer: $LOCK_SHA"

    - name: Resolve codetracer-trace-format ref
      id: resolve-trace-format-ref
      shell: bash
      run: |
        REF="$("${{ github.workspace }}/scripts/resolve-sibling-rev.sh" \
          --repo codetracer --sibling codetracer-trace-format \
          --manifest-dir "$CT_MANIFEST_DIR" --sha "$CT_LOCK_SHA" --no-walk)"
        echo "ref=${REF}" >> "$GITHUB_OUTPUT"

    - name: Clone codetracer-trace-format sibling
      uses: metacraft-labs/metacraft-github-actions/clone-repo@main
      with:
        repo: metacraft-labs/codetracer-trace-format
        ref: ${{ steps.resolve-trace-format-ref.outputs.ref }}
        path: ${{ github.workspace }}/../codetracer-trace-format
        gh-token: ${{ inputs.gh-token }}
        submodules: 'false'

    - name: Resolve codetracer-trace-format-nim ref
      id: resolve-trace-format-nim-ref
      shell: bash
      run: |
        REF="$("${{ github.workspace }}/scripts/resolve-sibling-rev.sh" \
          --repo codetracer --sibling codetracer-trace-format-nim \
          --manifest-dir "$CT_MANIFEST_DIR" --sha "$CT_LOCK_SHA" --no-walk)"
        echo "ref=${REF}" >> "$GITHUB_OUTPUT"

    - name: Clone codetracer-trace-format-nim sibling
      uses: metacraft-labs/metacraft-github-actions/clone-repo@main
      with:
        repo: metacraft-labs/codetracer-trace-format-nim
        ref: ${{ steps.resolve-trace-format-nim-ref.outputs.ref }}
        path: ${{ github.workspace }}/../codetracer-trace-format-nim
        gh-token: ${{ inputs.gh-token }}
        submodules: 'false'

    - name: Resolve codetracer-native-recorder ref
      id: resolve-native-recorder-ref
      shell: bash
      run: |
        REF="$("${{ github.workspace }}/scripts/resolve-sibling-rev.sh" \
          --repo codetracer --sibling codetracer-native-recorder \
          --manifest-dir "$CT_MANIFEST_DIR" --sha "$CT_LOCK_SHA" --no-walk)"
        echo "ref=${REF}" >> "$GITHUB_OUTPUT"

    - name: Clone codetracer-native-recorder sibling
      uses: metacraft-labs/metacraft-github-actions/clone-repo@main
      with:
        repo: metacraft-labs/codetracer-native-recorder
        ref: ${{ steps.resolve-native-recorder-ref.outputs.ref }}
        path: ${{ github.workspace }}/../codetracer-native-recorder
        gh-token: ${{ inputs.gh-token }}
        submodules: 'false'

    - name: Allow codetracer-native-recorder direnv
      shell: bash
      run: |
        if command -v direnv >/dev/null 2>&1; then
          direnv allow "${{ github.workspace }}/../codetracer-native-recorder"
        fi
