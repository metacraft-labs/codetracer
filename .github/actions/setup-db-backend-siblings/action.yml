name: Setup db-backend siblings
description: >
  Clone the sibling repositories required by ``src/db-backend``'s path
  dependencies (codetracer-trace-format, codetracer-trace-format-nim,
  codetracer-native-recorder), each at the revision pinned by the
  repo-workspaces workspace lock. This is a thin wrapper over the shared
  ``setup-dev-env`` action: it clones the three siblings adjacent to the
  host checkout (``../<name>``) and installs the ``dev-exec`` wrapper. Nix
  itself is installed by ``setup-dev-env`` when ``env-flavor: nix``; jobs
  that already run their own ``setup-nix`` step can still call this action —
  installing Nix twice is idempotent.
inputs:
  gh-token:
    description: GitHub token with access to sibling repositories.
    required: true
  substituters:
    description: Optional Nix substituters forwarded to setup-dev-env.
    required: false
    default: ""
  trusted-public-keys:
    description: Optional Nix trusted-public-keys forwarded to setup-dev-env.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Setup dev env (clone db-backend siblings + install Nix)
      # setup-dev-env resolves each sibling's revision from the per-commit
      # repo-workspaces workspace lock (the single approved source of sibling
      # revisions) and clones it to ../<name>. codetracer-native-recorder /
      # codetracer-trace-format / codetracer-trace-format-nim have no
      # .gitmodules; the recursive-submodule update is best-effort and a
      # no-op for them. The bespoke "direnv allow" fixup that used to live
      # here is left to the calling jobs (only the db-backend build.rs path
      # needs it, and those jobs already perform it).
      uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
      with:
        env-flavor: nix
        gh-token: ${{ inputs.gh-token }}
        substituters: ${{ inputs.substituters }}
        trusted-public-keys: ${{ inputs.trusted-public-keys }}
        siblings: |
          codetracer-trace-format
          codetracer-trace-format-nim
          codetracer-native-recorder
