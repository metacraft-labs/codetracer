name: Cross-Repo Integration Tests

on:
  pull_request:
    paths:
      - 'src/db-backend/**'
      - 'scripts/resolve-sibling-rev.sh'
      - 'scripts/run-cross-repo-tests.sh'
      - '.github/workflows/cross-repo-tests.yml'
  push:
    branches: [main, dev, stable]
    paths:
      - 'src/db-backend/**'
      - 'scripts/resolve-sibling-rev.sh'
      - 'scripts/run-cross-repo-tests.sh'
      - '.github/workflows/cross-repo-tests.yml'
  workflow_dispatch:
    inputs:
      rr_backend_ref:
        description: 'rr-backend git ref to test against (default: workspace lock)'
        required: false
        default: ''
      shell_recorders_ref:
        description: 'shell-recorders git ref to test against (default: workspace lock)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  rr-backend-tests:
    runs-on: eph-linux-x64  # CIP-5: nix job (setup-dev-env) → eph-linux-x64

    steps:
      - name: Mint installation token for cross-repo sibling access
        # GitHub free plan restricts org-level secrets with visibility
        # ALL from being readable inside private repos, so we mint
        # per-run installation tokens from the repo-local
        # CI_TOKEN_PROVIDER_APP_ID + CI_TOKEN_PROVIDER_PRIVATE_KEY
        # secrets via the CI Token Provider GitHub App.
        id: ci_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout codetracer
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.ci_token.outputs.token }}

      - name: Setup dev env
        # setup-dev-env installs Nix (with the Attic substituter/keys) and
        # clones the cross-repo siblings adjacent to this checkout at the
        # workspace-lock-pinned revisions (recursive submodules), replacing
        # the former Checkout-manifests / Resolve-lock / per-sibling
        # clone-repo machinery. The rr_backend_ref workflow_dispatch input
        # overrides codetracer-native-backend's locked revision (empty =>
        # lock). The native-backend submodule unfold below is still bespoke
        # because the path:-flake-input visibility fix is specific to this
        # repo's flake.
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.ci_token.outputs.token }}
          substituters: ${{ vars.ATTIC_SUBSTITUTER }}
          trusted-public-keys: ${{ vars.ATTIC_TRUSTED_PUBLIC_KEY }}
          siblings: |
            codetracer-native-backend=${{ github.event.inputs.rr_backend_ref }}
            codetracer-trace-format
            codetracer-trace-format-nim
            codetracer-native-recorder

      - name: Unfold native-backend submodules into parent index
        # codetracer-native-backend's flake.nix has
        # ``rr-soft.url = "path:libs/rr"`` and ``delve-patched.url
        # = "path:libs/delve"``.  Nix's path: flake-input resolver
        # uses ``git ls-files`` to decide which files are visible,
        # and the submodule contents aren't tracked in the parent
        # (only the gitlink is), so ``nix develop <native-backend>``
        # aborts with ``Path 'libs/delve/flake.nix' does not exist
        # in Git repository``.  Drop the inner .git, remove the
        # gitlink from the parent index, then ``git add -f`` the
        # materialised files so ``git ls-files`` sees them.
        shell: bash
        run: |
          set -uo pipefail
          PARENT="$(pwd)/../codetracer-native-backend"
          # The self-hosted nixos runner's bash-interactive shell
          # starts with a minimal PATH that doesn't include awk, so
          # parse the ``submodule status --recursive`` output with
          # pure bash instead.
          while IFS= read -r line; do
            # ``git submodule status`` prints e.g. ``+abc1234 libs/rr (...)``
            # or ``-abc1234 libs/rr``.  A leading ``-`` marks an
            # uninitialised submodule which we don't want to touch.
            [[ -z "$line" ]] && continue
            [[ "${line:0:1}" == "-" ]] && continue
            # Strip the leading status char + sha, then take field 2
            # (the path).
            rest="${line:1}"
            rest="${rest#* }"   # drop the sha (up to first space)
            sub="${rest%% *}"   # take everything up to the next space
            [[ -z "$sub" ]] && continue
            echo "  unfolding submodule native-backend/${sub}"
            rm -rf "$PARENT/${sub}/.git"
            git -C "$PARENT" rm -f --cached "${sub}" >/dev/null 2>&1 || true
            git -C "$PARENT" add -f "${sub}" 2>/dev/null || true
          done < <(git -C "$PARENT" submodule status --recursive 2>/dev/null)

      - name: Allow direnv in cloned codetracer-native-recorder
        # db-backend's build.rs (and the integration tests that build
        # it transitively) invoke ``direnv exec <recorder> bash
        # ct_emulator/build_native_api.sh`` to materialise generated C
        # sources.  A fresh clone's .envrc is in the "blocked" state,
        # so direnv refuses to run.  ``direnv allow`` whitelists it.
        run: |
          CLONE_DIR="$(pwd)/../codetracer-native-backend"
          nix develop "$CLONE_DIR" --command \
            direnv allow "$(pwd)/../codetracer-native-recorder"

      - name: Resolve ct_emulator nimble dependencies
        # build_native_api.sh's ``nim c ... ct_emulator.nim`` requires
        # the ``results`` nimble package (declared in ct_emulator.nimble);
        # without ``nimble install --depsOnly`` the script aborts with
        # ``cannot open file: results`` and db-backend's build.rs
        # panics during the cross-repo integration test cargo runs.
        run: |
          RECORDER_DIR="$(pwd)/../codetracer-native-recorder"
          nix develop "$(pwd)/../codetracer-native-backend" --command \
            direnv exec "$RECORDER_DIR" \
              bash -c "cd '$RECORDER_DIR/ct_emulator' && nimble install --depsOnly -y"

      - name: Build ct-native-replay
        run: |
          CLONE_DIR="$(pwd)/../codetracer-native-backend"
          nix develop "$CLONE_DIR" --command \
            bash -c "cd '$CLONE_DIR' && cargo build"

      - name: Resolve rr-backend environment paths
        id: rr-libs
        run: |
          CLONE_DIR="$(pwd)/../codetracer-native-backend"
          # Use markers to extract paths cleanly (nix develop may print banners)
          RAW="$(nix develop "$CLONE_DIR" --command bash -c \
            'echo "___LD_PATH_START___"; echo "$LD_LIBRARY_PATH"; echo "___LD_PATH_END___";
             echo "___PATH_START___"; echo "$PATH"; echo "___PATH_END___"')"
          RR_LD="$(echo "$RAW" | sed -n '/___LD_PATH_START___/{n;p;}')"
          RR_PATH="$(echo "$RAW" | sed -n '/___PATH_START___/{n;p;}')"
          echo "ld_library_path=$RR_LD" >> "$GITHUB_OUTPUT"
          echo "extra_path=$RR_PATH" >> "$GITHUB_OUTPUT"
          echo "Resolved rr-backend LD_LIBRARY_PATH: $RR_LD"
          echo "Resolved rr-backend PATH (first 200 chars): ${RR_PATH:0:200}..."

      - name: Run cross-repo integration tests
        run: |
          CT_NATIVE_REPLAY="$(pwd)/../codetracer-native-backend/target/debug/ct-native-replay"
          echo "Using ct-native-replay: $CT_NATIVE_REPLAY"
          RR_EXTRA_PATH="${{ steps.rr-libs.outputs.extra_path }}"
          RR_LD="${{ steps.rr-libs.outputs.ld_library_path }}"
          nix develop .#devShells.x86_64-linux.default --command \
            bash -c "
              export PATH=\"${RR_EXTRA_PATH}:\$PATH\"
              export CT_NATIVE_REPLAY_PATH=\"${CT_NATIVE_REPLAY}\"
              export CT_NATIVE_REPLAY_LD_LIBRARY_PATH=\"${RR_LD}\"
              export CODETRACER_RR_SOFT_MODE=1
              ./scripts/run-cross-repo-tests.sh --soft all
            "

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rr-backend-test-logs
          path: target/cross-test-logs/
          retention-days: 14
          if-no-files-found: ignore

  shell-recorder-tests:
    runs-on: eph-linux-x64  # CIP-5: nix job (setup-dev-env) → eph-linux-x64

    steps:
      - name: Mint installation token for cross-repo sibling access
        # GitHub free plan restricts org-level secrets with visibility
        # ALL from being readable inside private repos, so we mint
        # per-run installation tokens from the repo-local
        # CI_TOKEN_PROVIDER_APP_ID + CI_TOKEN_PROVIDER_PRIVATE_KEY
        # secrets via the CI Token Provider GitHub App.
        id: ci_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout codetracer
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.ci_token.outputs.token }}

      - name: Setup dev env
        # setup-dev-env installs Nix (with the Attic substituter/keys) and
        # clones codetracer-shell-recorders adjacent to this checkout at the
        # workspace-lock-pinned revision, replacing the former
        # Checkout-manifests / Resolve-lock / clone-repo steps. The
        # shell_recorders_ref workflow_dispatch input overrides the locked
        # revision (empty => lock).
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.ci_token.outputs.token }}
          substituters: ${{ vars.ATTIC_SUBSTITUTER }}
          trusted-public-keys: ${{ vars.ATTIC_TRUSTED_PUBLIC_KEY }}
          siblings: |
            codetracer-shell-recorders=${{ github.event.inputs.shell_recorders_ref }}

      - name: Build shell trace writer
        run: |
          CLONE_DIR="$(pwd)/../codetracer-shell-recorders"
          nix develop .#devShells.x86_64-linux.default --command \
            bash -c "cd '$CLONE_DIR' && cargo build"

      - name: Run shell-recorder integration tests
        run: |
          CLONE_DIR="$(pwd)/../codetracer-shell-recorders"
          BASH_RECORDER="${CLONE_DIR}/bash-recorder/launcher.sh"
          ZSH_RECORDER="${CLONE_DIR}/zsh-recorder/launcher.zsh"
          echo "Using bash recorder: $BASH_RECORDER"
          echo "Using zsh recorder: $ZSH_RECORDER"
          nix develop .#devShells.x86_64-linux.default --command \
            bash -c "
              export CODETRACER_BASH_RECORDER_PATH='${BASH_RECORDER}'
              export CODETRACER_ZSH_RECORDER_PATH='${ZSH_RECORDER}'
              cd src/db-backend
              cargo test --test bash_flow_integration --test zsh_flow_integration -- --nocapture
            "

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shell-recorder-test-logs
          path: target/cross-test-logs/
          retention-days: 14
          if-no-files-found: ignore
