  # M12: macOS verification pass for Value Origin Tracking.
  # Per-PR subset: Python materialized + Rust RR + MCP/CLI smoke. The full
  # per-language matrix (Ruby, JS, C, C++, Nim, Go, smart-contract languages)
  # runs nightly via origin-dap-macos-nightly below.
  #
  # Spec: codetracer-specs/Planned-Features/Value-Origin-Tracking.milestones.org
  # §M12. The CT_TEST_LANGS env var is read by the just test-origin-dap
  # target as a comma-separated allowlist (default 'all').
  origin-dap-macos:
    runs-on: [self-hosted, darwin, nix-darwin, aarch64-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Run origin-DAP per-PR subset (python + rust)
        env:
          CT_TEST_LANGS: python,rust
        run: nix develop . --command just test-origin-dap

  # M12: macOS nightly full matrix — runs every supported language. Scheduled
  # via the cron job at the top of this workflow (or manually via workflow_dispatch).
  origin-dap-macos-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, darwin, nix-darwin, aarch64-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Run origin-DAP full matrix (all languages)
        env:
          CT_TEST_LANGS: all
        run: nix develop . --command just test-origin-dap

  push-gpg-public-key:
    runs-on: [self-hosted, nixos]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}
      - name: "Import GPG key for signing commits"
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.CODETRACER_AUR_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.CODETRACER_AUR_GPG_PRIVATE_KEY_PASS }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true
      - name: "Upload public key"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY }}
        run: |
          nix develop .#devShells.x86_64-linux.default --command gpg --armor --export > CodeTracer.pub.asc
          nix develop .#devShells.x86_64-linux.default --command aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp CodeTracer.pub.asc s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer.pub.asc

  push-install-script:
    runs-on: [self-hosted, nixos]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}
      - name: Upload script
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY }}
        run: |
          nix develop .#devShells.x86_64-linux.default --command aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp install-on-distributions.sh s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/install.sh

  dev-build:
    runs-on: [self-hosted, nixos]
    needs:
      - lint-bash
      - lint-nim
      - lint-nix
      - lint-rust

    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Setup isonim siblings
        uses: ./.github/actions/setup-isonim-siblings
        with:
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - run: "nix develop .#devShells.x86_64-linux.default --command ./ci/build/dev.sh"

  nix-build:
    runs-on: [self-hosted, nixos]
    needs:
      - lint-bash
      - lint-nim
      - lint-nix
      - lint-rust

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - run: "nix develop .#devShells.x86_64-linux.default --command ./ci/build/nix.sh"

  build-python-packages:
    needs:
      - lint-bash
      - lint-nim
      - lint-nix
      - lint-rust

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            target_os: linux
            arch: amd64
            plat_name: manylinux_2_17_x86_64
          # - name: linux-arm64
          #   runner: ubuntu-22.04-arm64
          #   target_os: linux
          #   arch: arm64
          #   plat_name: manylinux_2_17_aarch64

          - name: macos-amd64
            runner: macos-15-intel
            target_os: macos
            arch: amd64
            plat_name: macosx_10_9_x86_64
          - name: macos-arm64
            runner: macos-14
            target_os: macos
            arch: arm64
            plat_name: macosx_11_0_arm64

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: 'true'
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}


      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python build backend
        run: python -m pip install --upgrade build

      - name: Install nim
        run: |
          set -euo pipefail

          wget https://nim-lang.org/download/nim-2.2.6.tar.xz
          tar xf nim-2.2.6.tar.xz
          pushd nim-2.2.6
          sh build.sh
          bin/nim c koch
          ./koch boot -d:release
          export PATH="$(pwd)/bin:${PATH}"
          popd

      - name: Get sqlite
        run: |
          set -euo pipefail

          wget https://sqlite.org/2025/sqlite-amalgamation-3500400.zip
          unzip sqlite-amalgamation-3500400.zip
          cp sqlite-amalgamation-3500400/sqlite3.c .

      - name: Install libssl and libbpf (Linux)
        if: ${{ matrix.target_os == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libbpf-dev libelf-dev

      - name: Install libssl (MacOS)
        if: ${{ matrix.target_os == 'macos' }}
        run: |
          git clone https://github.com/openssl/openssl
          pushd openssl
          git checkout openssl-3.5.4

          ./Configure --prefix=$(pwd)/../openssl-res
          make -j$(sysctl -n hw.ncpu)
          make install_sw

          popd

      - name: Install zlib (Linux)
        if: ${{ matrix.target_os == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev

      - name: Install zlib (MacOS)
        if: ${{ matrix.target_os == 'macos' }}
        run: |
          wget https://zlib.net/zlib-1.3.2.tar.gz
          tar xf zlib-1.3.2.tar.gz
          pushd zlib-1.3.2

          ./configure --static --prefix=$(pwd)/../zlib-res
          make -j$(sysctl -n hw.ncpu)
          make install

          popd

      - name: Build codetracer binaries (Linux)
        if: ${{ matrix.target_os == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail

          TARGET_DIR="build-python/src/ct/bin/${{ matrix.target_os }}-${{ matrix.arch }}"
          mkdir -p "${TARGET_DIR}"

          ./nim-2.2.6/bin/nim -d:release \
            --d:asyncBackend=asyncdispatch \
            --dynlibOverride:std -d:staticStd \
            --mm:refc --hints:on --warnings:off \
            --boundChecks:on \
            -d:useOpenssl3 \
            -d:ssl \
            -d:chronicles_sinks=json -d:chronicles_line_numbers=true \
            -d:chronicles_timestamps=UnixTime \
            -d:ctTest -d:testing --hint"[XDeclaredButNotUsed]":off \
            -d:builtWithNix \
            -d:ctEntrypoint \
            -d:pythonPackage \
            -d:libcPath=libc \
            -d:pathToNodeModules=../node_modules \
            --nimcache:nimcache \
            -d:staticSqlite \
            -d:useLibzipSrc \
            --passL:"-Wl,-Bstatic -L/usr/lib/x86_64-linux-gnu -l:libz.a -Wl,-Bdynamic" \
            --dynlibOverride:ssl --dynlibOverride:crypto \
            --passL:"-Wl,-Bstatic -L/usr/lib/x86_64-linux-gnu -l:libssl.a -l:libcrypto.a -Wl,-Bdynamic" \
            --out:"${TARGET_DIR}/ct" c ./src/ct/codetracer.nim

          ./nim-2.2.6/bin/nim \
            -d:release -d:asyncBackend=asyncdispatch \
            --mm:refc --hints:off --warnings:off \
            --debugInfo --lineDir:on \
            --boundChecks:on --stacktrace:on --linetrace:on \
            -d:chronicles_sinks=json -d:chronicles_line_numbers=true \
            -d:chronicles_timestamps=UnixTime \
            -d:ssl \
            -d:ctTest -d:testing --hint"[XDeclaredButNotUsed]":off \
            -d:libcPath=libc \
            -d:builtWithNix \
            -d:ctEntrypoint \
            -d:pythonPackage \
            --nimcache:nimcache \
            -d:staticSqlite \
            -d:useLibzipSrc \
            --passL:"-Wl,-Bstatic -L/usr/lib/x86_64-linux-gnu -l:libz.a -Wl,-Bdynamic" \
            --dynlibOverride:ssl --dynlibOverride:crypto \
            --passL:"-Wl,-Bstatic -L/usr/lib/x86_64-linux-gnu -l:libssl.a -l:libcrypto.a -Wl,-Bdynamic" \
            --out:"${TARGET_DIR}/db-backend-record" c ./src/ct/db_backend_record.nim

          ./build-python/scripts/download_ct_remote.sh \
            "${{ matrix.target_os }}" \
            "${{ matrix.arch }}" \
            "${TARGET_DIR}"

      - name: Build codetracer binaries (MacOS)
        if: ${{ matrix.target_os == 'macos' }}
        run: |
          set -euo pipefail

          TARGET_DIR="build-python/src/ct/bin/${{ matrix.target_os }}-${{ matrix.arch }}"
          mkdir -p "${TARGET_DIR}"

          ./nim-2.2.6/bin/nim -d:release \
            --d:asyncBackend=asyncdispatch \
            --dynlibOverride:std -d:staticStd \
            --mm:refc --hints:on --warnings:off \
            --boundChecks:on \
            -d:useOpenssl3 \
            -d:ssl \
            -d:chronicles_sinks=json -d:chronicles_line_numbers=true \
            -d:chronicles_timestamps=UnixTime \
            -d:ctTest -d:testing --hint"[XDeclaredButNotUsed]":off \
            -d:builtWithNix \
            -d:ctEntrypoint \
            -d:pythonPackage \
            -d:libcPath=libc \
            -d:pathToNodeModules=../node_modules \
            --nimcache:nimcache \
            -d:staticSqlite \
            -d:useLibzipSrc \
            --passL:"$(pwd)/zlib-res/lib/libz.a" \
            --dynlibOverride:ssl --dynlibOverride:crypto \
            --passL:"$(pwd)/openssl-res/lib/libssl.a $(pwd)/openssl-res/lib/libcrypto.a" \
            --out:"${TARGET_DIR}/ct" c ./src/ct/codetracer.nim

          ./nim-2.2.6/bin/nim \
            -d:release -d:asyncBackend=asyncdispatch \
            --mm:refc --hints:off --warnings:off \
            --debugInfo --lineDir:on \
            --boundChecks:on --stacktrace:on --linetrace:on \
            -d:chronicles_sinks=json -d:chronicles_line_numbers=true \
            -d:chronicles_timestamps=UnixTime \
            -d:ssl \
            -d:ctTest -d:testing --hint"[XDeclaredButNotUsed]":off \
            -d:libcPath=libc \
            -d:builtWithNix \
            -d:ctEntrypoint \
            -d:pythonPackage \
            --nimcache:nimcache \
            -d:staticSqlite \
            -d:useLibzipSrc \
            --passL:"$(pwd)/zlib-res/lib/libz.a" \
            --dynlibOverride:ssl --dynlibOverride:crypto \
            --passL:"$(pwd)/openssl-res/lib/libssl.a $(pwd)/openssl-res/lib/libcrypto.a" \
            --out:"${TARGET_DIR}/db-backend-record" c ./src/ct/db_backend_record.nim

          ./build-python/scripts/download_ct_remote.sh \
            "${{ matrix.target_os }}" \
            "${{ matrix.arch }}" \
            "${TARGET_DIR}"

      - name: Build wheel
        run: |
          set -euo pipefail

          pushd build-python
          python -m build --wheel -C--build-option=--plat-name=${{ matrix.plat_name }}
          popd

      - name: Upload distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-dist-${{ matrix.name }}
          path: build-python/dist/*.whl
          if-no-files-found: error

  appimage-build:
    runs-on: [self-hosted, nixos]
    needs:
      - lint-bash
      - lint-nim
      - lint-nix
      - lint-rust

    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Setup isonim siblings
        # appimage-build runs nim *outside* the Nix sandbox via
        # ``./ci/build/appimage.sh``; clone the isonim siblings next
        # to the codetracer checkout so codetracer's ``nim.cfg``
        # ``path:"../isonim/src"`` directives resolve.
        uses: ./.github/actions/setup-isonim-siblings
        with:
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: "Import GPG key for signing commits"
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.CODETRACER_AUR_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.CODETRACER_AUR_GPG_PRIVATE_KEY_PASS }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Build
        run: "nix develop .#devShells.x86_64-linux.default --command ./ci/build/appimage.sh"

      - name: Upload artifact
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY }}
        run: |
          nix develop .#devShells.x86_64-linux.default --command gpg --armor --detach-sign CodeTracer.AppImage
          nix develop .#devShells.x86_64-linux.default --command aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp CodeTracer.AppImage s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-${{ github.ref_name }}-amd64.AppImage
          nix develop .#devShells.x86_64-linux.default --command aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp CodeTracer.AppImage.asc s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-${{ github.ref_name }}-amd64.AppImage.asc

  dmg-build:
    runs-on: macos-latest
    needs:
      - lint-bash
      - lint-nim
      - lint-nix
      - lint-rust

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: "Import GPG key for signing commits"
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.CODETRACER_AUR_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.CODETRACER_AUR_GPG_PRIVATE_KEY_PASS }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: ./ci/build/dmg.sh

      - name: Install AWS CLI
        run: brew install awscli

      - name: Upload artifact
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY }}
        run: |
          gpg --armor --detach-sign non-nix-build/CodeTracer.dmg
          # for now apply workaround from https://community.cloudflare.com/t/an-error-occurred-internalerror-when-calling-the-putobject-operation/764905/11:
          #   adding `--checksum-algorithm CRC32`
          aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp ./non-nix-build/CodeTracer.dmg s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-${{ github.ref_name }}-arm64.dmg --checksum-algorithm CRC32
          aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp ./non-nix-build/CodeTracer.dmg.asc s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-${{ github.ref_name }}-arm64.dmg.asc --checksum-algorithm CRC32

  dmg-lib-check:
    runs-on: macos-latest
    needs:
      - dmg-build
    steps:
      - name: Install AWS CLI
        run: brew install awscli

      - name: Install 7zip
        run: brew install sevenzip

      - name: Download artifact
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY }}
        run: |
          aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-${{ github.ref_name }}-arm64.dmg ./CodeTracer.dmg

      - name: Extract dmg
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY }}
        run: |
          7zz x ./CodeTracer.dmg

      - name: Check if ct starts
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY }}
        run: |
          ./CodeTracer/CodeTracer.app/Contents/MacOS/bin/ct --version

  appimage-lib-check:
    runs-on: ubuntu-latest
    needs:
      - appimage-build
    steps:
      - name: Install AWS CLI
        if: ${{ startsWith(github.ref, 'refs/tags/') && !github.event['codetracer-ci'] }}
        run: sudo snap install aws-cli --classic

      - name: Install FUSE
        run: sudo apt-get install -y fuse libfuse2

      - name: Download artifact
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY }}
        run: |
          aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-${{ github.ref_name }}-amd64.AppImage ./CodeTracer.AppImage

      - name: Check if ct starts
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY }}
        run: |
          chmod +x ./CodeTracer.AppImage
          ./CodeTracer.AppImage --version

  # Cross-distro AppImage smoke.  ubuntu-latest (the appimage-lib-check
  # runner above) shares too many runtime libs with the build host to
  # catch glibc/libgcc/libstdc++ symbol-version regressions or a missing
  # patchelf entry.  This matrix runs `--version`, `--help`, and a tiny
  # `ct record` of a Python script on five distinct base images via
  # Docker, using AppImage's `--appimage-extract-and-run` mode so we
  # don't need FUSE in the runner.  See
  # scripts/test-appimage-cross-distro.sh.
  appimage-cross-distro:
    runs-on: ubuntu-latest
    needs:
      - appimage-build
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:12
          - fedora:40
          - archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install AWS CLI
        if: ${{ startsWith(github.ref, 'refs/tags/') && !github.event['codetracer-ci'] }}
        run: sudo snap install aws-cli --classic

      - name: Download AppImage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY }}
        run: |
          aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-${{ github.ref_name }}-amd64.AppImage ./CodeTracer.AppImage

      - name: Smoke-test on ${{ matrix.distro }}
        run: |
          bash scripts/test-appimage-cross-distro.sh \
            --distro ${{ matrix.distro }} \
            ./CodeTracer.AppImage

  test-non-gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: nixos
            runner: [self-hosted, nixos]
          - platform: macos
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    # macOS tests are new and may have pre-existing failures; don't block PRs
    continue-on-error: ${{ matrix.platform == 'macos' }}
    needs:
      - lint-bash
      - lint-nim
      - lint-nix
      - lint-rust
    steps:
      - name: Generate CI token
        if: matrix.platform == 'nixos'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Setup isonim siblings (nixos)
        # ``just test`` -> ``test-nimsuggest`` needs the codetracer
        # source to build, which pulls in ``../isonim/src`` siblings.
        if: matrix.platform == 'nixos'
        uses: ./.github/actions/setup-isonim-siblings
        with:
          gh-token: ${{ steps.app-token.outputs.token }}

      # --- NixOS setup ---
      - name: Install Nix
        if: matrix.platform == 'nixos'
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      # --- macOS setup ---
      - name: Install just (macOS)
        if: matrix.platform == 'macos'
        run: brew install just

      - name: Set up Python 3.12 (macOS)
        if: matrix.platform == 'macos'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust toolchain (macOS)
        if: matrix.platform == 'macos'
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest (macOS)
        if: matrix.platform == 'macos'
        run: curl -LsSf https://get.nexte.st/latest/mac | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Build (non-nix)
        if: matrix.platform == 'macos'
        run: ./non-nix-build/build.sh

      - name: Clone python-recorder (macOS)
        if: matrix.platform == 'macos'
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-python-recorder
          ref: main
          path: ${{ github.workspace }}/../codetracer-python-recorder
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Clone ruby-recorder (macOS)
        if: matrix.platform == 'macos'
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-ruby-recorder
          ref: main
          path: ${{ github.workspace }}/../codetracer-ruby-recorder
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      # ── BEAM (Erlang / Elixir) recorder ──────────────────────────────
      # ``src/db-backend/tests/erlang_flow_dap_test.rs`` and
      # ``elixir_flow_dap_test.rs`` resolve the recorder binary via
      # ``test_harness::find_beam_recorder()``: env var override →
      # ``$PATH`` → sibling ``../codetracer-beam-recorder/target/{debug,
      # release}/codetracer-beam-recorder``.  The tests ``assert!`` and
      # panic when none of those hit, so they need the recorder repo
      # cloned AND its binary compiled before ``./ci/test/non-gui.sh``
      # runs.  Same sibling-pin pattern as codetracer-native-recorder
      # (resolve-mcr-ref + clone-repo + nix-develop build).
      - name: Resolve codetracer-beam-recorder ref
        if: matrix.platform == 'nixos'
        id: resolve-beam-ref
        shell: bash
        run: |
          PINS=".github/sibling-pins"
          REF="main"
          if [ -f "${PINS}" ]; then
            PIN_REF="$(grep '^codetracer-beam-recorder ' "${PINS}" | cut -d' ' -f2)" || true
            [ -n "${PIN_REF}" ] && REF="${PIN_REF}"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Clone codetracer-beam-recorder (nixos)
        if: matrix.platform == 'nixos'
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-beam-recorder
          ref: ${{ steps.resolve-beam-ref.outputs.ref }}
          path: ${{ github.workspace }}/../codetracer-beam-recorder
          gh-token: ${{ steps.app-token.outputs.token }}
          submodules: 'false'

      - name: Build codetracer-beam-recorder (nixos)
        # The recorder's Justfile `build` target shells into the
        # recorder's own ``nix develop`` shell when cargo isn't on
        # PATH and runs ``cargo build --locked`` there.  We pre-build
        # so ``find_beam_recorder()`` resolves the binary at
        # ``../codetracer-beam-recorder/target/debug/codetracer-beam-recorder``
        # without the test having to bootstrap nim/cargo itself.
        if: matrix.platform == 'nixos'
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/../codetracer-beam-recorder"
          nix develop --no-write-lock-file --command just build

      - name: Clone codetracer-beam-recorder (macOS)
        if: matrix.platform == 'macos'
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-beam-recorder
          ref: main
          path: ${{ github.workspace }}/../codetracer-beam-recorder
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Build codetracer-beam-recorder (macOS)
        # macOS has cargo from ``Set up Rust toolchain (macOS)`` above,
        # so the recorder's Justfile takes the native ``build-native``
        # branch.  Elixir / rebar3 aren't required to *produce* the
        # binary — only to run its full test matrix — so we just
        # invoke ``cargo build --locked`` directly to keep the
        # macOS prerequisites narrow.
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/../codetracer-beam-recorder"
          cargo build --locked

      # Runs all Rust tests including flow integration tests for all languages.
      # WASM flow tests skip automatically if wazero or wasm32-wasip1 target
      # are not available. Stylus flow tests are #[ignore] and need a devnode.
      # Cross-repo tests (rr) run in the separate test-ui-tests-rr job.
      - name: Run tests
        run: ./ci/test/non-gui.sh
        env:
          CODETRACER_CI_PLATFORM: ${{ matrix.platform }}

  test-ui-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: nixos
            runner: [self-hosted, nixos]
          - platform: macos
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    # macOS tests are new and may have pre-existing failures; don't block PRs
    continue-on-error: ${{ matrix.platform == 'macos' }}
    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Resolve codetracer-trace-format ref
        id: resolve-trace-format-ref
        shell: bash
        run: |
          PINS=".github/sibling-pins"
          REF="main"
          if [ -f "${PINS}" ]; then
            PIN_REF="$(grep '^codetracer-trace-format ' "${PINS}" | cut -d' ' -f2)" || true
            [ -n "${PIN_REF}" ] && REF="${PIN_REF}"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Clone codetracer-trace-format into libs/
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-trace-format
          ref: ${{ steps.resolve-trace-format-ref.outputs.ref }}
          path: ${{ github.workspace }}/libs/codetracer-trace-format
          gh-token: ${{ steps.app-token.outputs.token }}
          submodules: 'false'

      # --- NixOS setup ---
      - name: Install Nix
        if: matrix.platform == 'nixos'
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Build CodeTracer (nix)
        if: matrix.platform == 'nixos'
        run: nix build --print-build-logs '.?submodules=1#codetracer' --override-input codetracer-trace-format path:./libs/codetracer-trace-format

      # --- macOS setup ---
      - name: Install just (macOS)
        if: matrix.platform == 'macos'
        run: brew install just

      - name: Set up Python 3.12 (macOS)
        if: matrix.platform == 'macos'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust toolchain (macOS)
        if: matrix.platform == 'macos'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup isonim siblings (macOS)
        if: matrix.platform == 'macos'
        # codetracer's nim.cfg ``--path:``s into ``../isonim/src`` and
        # five other isonim sibling repos.  Without them the
        # frontend build aborts with ``cannot open file:
        # isonim/core/async_compat``.  Reuse the composite action
        # the Linux jobs already use.
        uses: ./.github/actions/setup-isonim-siblings
        with:
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Stage codetracer-trace-format as a sibling (macOS)
        if: matrix.platform == 'macos'
        # ``src/db-backend/Cargo.toml`` has path deps like
        # ``../../../codetracer-trace-format/codetracer_ctfs`` -- they
        # resolve to ``$workspace/../codetracer-trace-format``.  The
        # earlier ``Clone codetracer-trace-format into libs/`` step
        # gives us only the in-repo copy used by the nix flake
        # override.  Symlink it next to the checkout so cargo finds
        # the path dependency at the expected location.
        shell: bash
        run: |
          set -euo pipefail
          ln -snf "${{ github.workspace }}/libs/codetracer-trace-format" \
            "${{ github.workspace }}/../codetracer-trace-format"

      - name: Resolve codetracer-trace-format-nim ref (macOS)
        if: matrix.platform == 'macos'
        id: resolve-trace-format-nim-ref-macos
        shell: bash
        run: |
          PINS=".github/sibling-pins"
          REF="main"
          if [ -f "${PINS}" ]; then
            PIN_REF="$(grep '^codetracer-trace-format-nim ' "${PINS}" | cut -d' ' -f2)" || true
            [ -n "${PIN_REF}" ] && REF="${PIN_REF}"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Clone codetracer-trace-format-nim sibling (macOS)
        if: matrix.platform == 'macos'
        # ``codetracer_trace_writer_nim``'s ``build.rs`` (inside
        # codetracer-trace-format) reads
        # ``../codetracer-trace-format-nim/src/codetracer_trace_writer_ffi.nim``
        # at cargo build time.  Without this clone the macOS non-nix
        # build aborts with ``Nim FFI entry point not found``.
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-trace-format-nim
          ref: ${{ steps.resolve-trace-format-nim-ref-macos.outputs.ref }}
          path: ${{ github.workspace }}/../codetracer-trace-format-nim
          gh-token: ${{ steps.app-token.outputs.token }}
          submodules: 'false'

      - name: Resolve codetracer-native-recorder ref (macOS)
        if: matrix.platform == 'macos'
        id: resolve-native-recorder-ref-macos
        shell: bash
        run: |
          PINS=".github/sibling-pins"
          REF="main"
          if [ -f "${PINS}" ]; then
            PIN_REF="$(grep '^codetracer-native-recorder ' "${PINS}" | cut -d' ' -f2)" || true
            [ -n "${PIN_REF}" ] && REF="${PIN_REF}"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Clone codetracer-native-recorder sibling (macOS)
        if: matrix.platform == 'macos'
        # ``src/db-backend/build.rs`` canonicalises
        # ``../../../codetracer-native-recorder`` (i.e. the workspace
        # sibling) at compile time.  Without this clone cargo aborts
        # with ``expected sibling codetracer-native-recorder repo``.
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-native-recorder
          ref: ${{ steps.resolve-native-recorder-ref-macos.outputs.ref }}
          path: ${{ github.workspace }}/../codetracer-native-recorder
          gh-token: ${{ steps.app-token.outputs.token }}
          submodules: 'false'

      - name: Resolve codetracer-visual-replay ref (macOS)
        if: matrix.platform == 'macos'
        id: resolve-visual-replay-ref-macos
        shell: bash
        run: |
          PINS=".github/sibling-pins"
          REF="main"
          if [ -f "${PINS}" ]; then
            PIN_REF="$(grep '^codetracer-visual-replay ' "${PINS}" | cut -d' ' -f2)" || true
            [ -n "${PIN_REF}" ] && REF="${PIN_REF}"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Clone codetracer-visual-replay sibling (macOS)
        if: matrix.platform == 'macos'
        # ``ct_cli`` (codetracer-native-recorder) pulls
        # ``gfx_stream/ctfs_visual`` from codetracer-visual-replay/src
        # at compile time; without this clone ``just build-ct-mcr``
        # aborts with ``cannot open file: gfx_stream/ctfs_visual``.
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-visual-replay
          ref: ${{ steps.resolve-visual-replay-ref-macos.outputs.ref }}
          path: ${{ github.workspace }}/../codetracer-visual-replay
          gh-token: ${{ steps.app-token.outputs.token }}
          submodules: 'false'

      - name: Resolve codetracer-native-backend ref (macOS)
        if: matrix.platform == 'macos'
        id: resolve-native-backend-ref-macos
        shell: bash
        run: |
          PINS=".github/sibling-pins"
          REF="main"
          if [ -f "${PINS}" ]; then
            PIN_REF="$(grep '^codetracer-native-backend ' "${PINS}" | cut -d' ' -f2)" || true
            [ -n "${PIN_REF}" ] && REF="${PIN_REF}"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Clone codetracer-native-backend sibling (macOS)
        if: matrix.platform == 'macos'
        # ``just build-ct-mcr`` -> ``build-license-ffi`` cds into
        # ``../codetracer-native-backend`` and runs ``cargo build``
        # for ``libct_license_ffi``.  Without this clone the recipe
        # aborts with ``could not find Cargo.toml`` at line 110 of
        # the recorder's Justfile.
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-native-backend
          ref: ${{ steps.resolve-native-backend-ref-macos.outputs.ref }}
          path: ${{ github.workspace }}/../codetracer-native-backend
          gh-token: ${{ steps.app-token.outputs.token }}
          submodules: 'false'

      - name: Clone codetracer-snapshot-codecs sibling (macOS)
        if: matrix.platform == 'macos'
        # codetracer-visual-replay's config.nims threads
        # ``--path:../codetracer-snapshot-codecs/src`` into the Nim
        # compile.  The build aborts with ``cannot open file:
        # snapshot_codecs`` without this checkout.
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-snapshot-codecs
          ref: main
          path: ${{ github.workspace }}/../codetracer-snapshot-codecs
          gh-token: ${{ steps.app-token.outputs.token }}
          submodules: 'false'

      - name: Clone codetracer-image-diff sibling (macOS)
        if: matrix.platform == 'macos'
        # Companion sibling to codetracer-snapshot-codecs threaded via
        # the same ``config.nims`` --path; without it ST-M3 test
        # imports break the visual-replay build.
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-image-diff
          ref: main
          path: ${{ github.workspace }}/../codetracer-image-diff
          gh-token: ${{ steps.app-token.outputs.token }}
          submodules: 'false'

      - name: Install Nix (macOS, for ct_cli build)
        # See comment block below for why we don't use the shared
        # ``setup-nix`` composite on macos-latest.
        # The macOS Playwright suite includes visual-replay specs
        # (``visual-replay-real-recording.spec.ts``,
        # ``visual-recording-book-screenshots.spec.ts``) that
        # ``requireExecutable(ct_cli)`` at module-load time.  Build
        # ct_cli through the sibling's ``just`` target under
        # ``direnv exec`` -- the pattern documented in
        # metacraft-dev-guidelines/policies/ci-workflow-standards.md
        # "Building artifacts from sibling repos".  That target's
        # ``.envrc`` does ``use flake``, so we need a working Nix
        # install on the runner first.
        #
        # We bypass the shared ``setup-nix`` composite because it
        # pins ``cachix/install-nix-action@v27`` which on
        # ``macos-latest`` (arm64) trips
        # ``eDSRecordAlreadyExists`` while creating the
        # ``_nixbld1`` build user -- the GitHub-hosted Apple Silicon
        # image carries leftover Nix state from its base snapshot
        # that the older installer can't recover from.
        # DeterminateSystems/nix-installer-action is the
        # recommended workaround on that runner image; cachix on
        # nixos / darwin self-hosted runners stays on v27 because
        # those don't trip the same state issue.
        if: matrix.platform == 'macos'
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ steps.app-token.outputs.token }}
            substituters = https://cache.nixos.org ${{ vars.SUBSTITUTERS }}
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= ${{ vars.TRUSTED_PUBLIC_KEYS }}

      - name: Configure Cachix (macOS)
        if: matrix.platform == 'macos'
        # The DeterminateSystems installer doesn't auto-configure
        # Cachix substituters/auth.  Without this, ``scripts/build-
        # siblings.sh`` re-evaluates each sibling's flake from
        # source which (a) prints ``HTTP error 401`` against
        # metacraft-labs-codetracer.cachix.org and (b) makes the
        # cold ct-mcr build ~45 min instead of ~10 min.
        uses: cachix/cachix-action@v15
        with:
          name: ${{ vars.CACHIX_CACHE }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Build ct-mcr via codetracer-native-recorder nix develop (macOS)
        if: matrix.platform == 'macos'
        # The macOS Playwright suite needs ct_cli/ct_cli built from
        # the codetracer-native-recorder sibling.  Use the recorder's
        # own ``nix develop`` shell + its ``just build-ct-mcr`` target
        # so the recipe is single-sourced in the sibling's Justfile
        # (canonical pattern from
        # metacraft-dev-guidelines/policies/ci-workflow-standards.md
        # "Building artifacts from sibling repos").
        #
        # We bypass scripts/build-siblings.sh because that script
        # assumes direnv-allow state and a parent codetracer dev shell
        # that supplies nim/nimble.  On macos-latest none of those
        # preconditions hold yet -- ``nix develop`` invokes the recorder's
        # flake directly and supplies the same Nim/Rust/LLDB toolchain
        # the recipe expects, without the direnv allow state plumbing.
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/../codetracer-native-recorder"
          # Allow cargo to use git's credential helper so cloning the
          # private ``lldb-sys.rs`` dependency picks up the App-token
          # we set via ``GIT_CREDENTIALS`` below.
          export CARGO_NET_GIT_FETCH_WITH_CLI=true
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "ssh://git@github.com/"
          nix develop --no-write-lock-file --command just build-ct-mcr

      - name: Build ct_gfx_player via codetracer-visual-replay nix develop (macOS)
        if: matrix.platform == 'macos'
        # The Playwright suite's visual-replay specs
        # ``requireExecutable(ct_gfx_player)`` at module-load time.
        # ``codetracer-visual-replay``'s ``just build`` target wraps
        # ``nimble build`` and emits ct_gfx_player + ct-native-replay
        # at the repo root, which is where
        # ``src/tests/gui/lib/real-visual-trace.ts`` expects them.
        # Same direct ``nix develop --command`` pattern as ct-mcr.
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/../codetracer-visual-replay"
          nix develop --no-write-lock-file --command just build

      - name: Build CodeTracer (non-nix)
        if: matrix.platform == 'macos'
        # ``build_trace_writer_ffi.sh`` looks for codetracer-trace-format
        # at ``$ROOT_DIR/../codetracer-trace-format`` (the dev-machine
        # workspace-sibling layout).  In CI we already clone it into
        # ``libs/codetracer-trace-format``; point TRACE_FORMAT_DIR there
        # instead of duplicating the clone.
        #
        # The codetracer_trace_writer_nim build.rs also defaults to
        # running ``nimble install --depsOnly`` to pull stew + results;
        # ``install_nim_osx.sh`` only bootstraps Nim itself (no nimble
        # binary), so SKIP that step and provide the deps via
        # CODETRACER_TRACE_FORMAT_NIM_EXTRA_PATHS instead.  Same pair
        # of stew paths the Nix derivation uses (``stew/`` first so
        # ``import results`` resolves to stew's results.nim, then the
        # parent so ``import stew/...`` also resolves).
        # db-backend's build.rs wraps build_native_api.sh in
        # ``direnv exec`` on POSIX so the recorder's Nim/Nimble env
        # loads onto PATH.  macos-latest doesn't ship direnv and
        # we already have nim on PATH from install_nim_osx.sh, so
        # tell build.rs to skip the direnv wrapper.
        env:
          TRACE_FORMAT_DIR: ${{ github.workspace }}/libs/codetracer-trace-format
          CT_EMULATOR_EXTRA_NIM_PATHS: ${{ github.workspace }}/libs/nim-stew/stew:${{ github.workspace }}/libs/nim-stew
          CODETRACER_TRACE_FORMAT_NIM_SKIP_NIMBLE_INSTALL: "1"
          CODETRACER_TRACE_FORMAT_NIM_EXTRA_PATHS: ${{ github.workspace }}/libs/nim-stew/stew:${{ github.workspace }}/libs/nim-stew
          CODETRACER_DB_BACKEND_SKIP_DIRENV: "1"
        run: ./non-nix-build/build.sh

      - name: Clone python-recorder (macOS)
        if: matrix.platform == 'macos'
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-python-recorder
          ref: main
          path: ${{ github.workspace }}/../codetracer-python-recorder
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Clone ruby-recorder (macOS)
        if: matrix.platform == 'macos'
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-ruby-recorder
          ref: main
          path: ${{ github.workspace }}/../codetracer-ruby-recorder
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Run TypeScript Playwright UI tests (DB-based only)
        run: ./ci/test/ui-tests-db.sh
        env:
          CODETRACER_CI_PLATFORM: ${{ matrix.platform }}
          CODETRACER_DB_TESTS_ONLY: "1"

  test-ui-tests-rr:
    runs-on: [self-hosted, nixos]
    timeout-minutes: 120
    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Resolve codetracer-trace-format ref
        id: resolve-trace-format-ref
        shell: bash
        run: |
          PINS=".github/sibling-pins"
          REF="main"
          if [ -f "${PINS}" ]; then
            PIN_REF="$(grep '^codetracer-trace-format ' "${PINS}" | cut -d' ' -f2)" || true
            [ -n "${PIN_REF}" ] && REF="${PIN_REF}"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Clone codetracer-trace-format into libs/
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-trace-format
          ref: ${{ steps.resolve-trace-format-ref.outputs.ref }}
          path: ${{ github.workspace }}/libs/codetracer-trace-format
          gh-token: ${{ steps.app-token.outputs.token }}
          submodules: 'false'

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Build CodeTracer
        run: nix build --print-build-logs '.?submodules=1#codetracer' --override-input codetracer-trace-format path:./libs/codetracer-trace-format

      - name: Setup rr-backend
        env:
          GH_TOKEN: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}
        run: ./ci/setup-rr-backend.sh

      - name: Run TypeScript Playwright UI tests (RR-based only)
        env:
          CODETRACER_E2E_CT_PATH: ${{ github.workspace }}/result/bin/ct
          CODETRACER_RR_BACKEND_PATH: ${{ github.workspace }}/../codetracer-native-backend
          CODETRACER_RR_BACKEND_PRESENT: "1"
          CODETRACER_RR_TESTS_ONLY: "1"
          PLAYWRIGHT_GLOBAL_TIMEOUT: "10800000"
        run: "nix develop .#devShells.x86_64-linux.default --command just test-gui"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: ui-tests-rr-artifacts
          path: |
            tsc-ui-tests/test-results/
            tsc-ui-tests/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  visual-replay-regression-gate:
    runs-on: [self-hosted, nixos]
    timeout-minutes: 180
    steps:
      - name: Checkout CodeTracer
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Resolve codetracer-visual-replay ref
        id: visual-replay-ref
        # The self-hosted ``nixos`` runner's bash-interactive shell
        # starts with a minimal PATH that doesn't include ``awk`` /
        # ``cut`` from coreutils, so the previous ``awk`` parse failed
        # with ``awk: command not found`` (exit 127).  Use pure bash
        # parameter expansion instead -- no external tools required.
        shell: bash
        run: |
          set -euo pipefail
          PINS=".github/sibling-pins"
          if [[ ! -f "$PINS" ]]; then
            echo "Missing $PINS" >&2
            exit 1
          fi
          REF=""
          while IFS=$' \t' read -r name sha _rest; do
            if [[ "$name" == "codetracer-visual-replay" ]]; then
              REF="$sha"
              break
            fi
          done < "$PINS"
          if [[ -z "$REF" ]]; then
            echo "Missing codetracer-visual-replay pin in $PINS" >&2
            exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Resolved codetracer-visual-replay ref: $REF"

      - name: Clone codetracer-visual-replay
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-visual-replay
          ref: ${{ steps.visual-replay-ref.outputs.ref }}
          path: ${{ github.workspace }}/../codetracer-visual-replay
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Restore codetracer-visual-replay sibling pins
        # Same awk-not-on-PATH constraint as Resolve codetracer-visual-replay
        # ref above; replace awk with a pure-bash ``while read`` loop.
        shell: bash
        env:
          TOKEN: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}
        run: |
          set -euo pipefail
          PINS="${{ github.workspace }}/../codetracer-visual-replay/.github/sibling-pins"
          if [[ ! -f "$PINS" ]]; then
            echo "Missing visual replay sibling pins: $PINS" >&2
            exit 1
          fi

          # Collect pin names into a bash array so we can check
          # ``required`` entries without shelling out to awk/grep.
          declare -A PIN_NAMES
          while IFS=$' \t' read -r name _sha _branch; do
            [[ -z "$name" ]] && continue
            PIN_NAMES["$name"]=1
          done < "$PINS"

          for required in \
            codetracer-native-backend \
            codetracer-native-recorder \
            codetracer-native-test-programs \
            codetracer-visual-replay-fixtures; do
            if [[ -z "${PIN_NAMES[$required]:-}" ]]; then
              echo "Missing required visual replay sibling pin: $required" >&2
              exit 1
            fi
          done

          while IFS=$' \t' read -r name sha branch; do
            [[ -z "$name" ]] && continue
            # Skip ``codetracer`` itself — visual-replay's sibling-pins
            # lists codetracer as a sibling because VR depends on it,
            # but here we ARE codetracer, and ``<workspace>/../codetracer``
            # resolves to the very workspace we're running in.  Cloning
            # over it fails with ``could not create work tree dir ...:
            # File exists`` after the ``rm -rf`` no-ops on a non-empty
            # active directory.
            if [[ "$name" == "codetracer" ]]; then
              echo "Skipping self-pin: codetracer"
              continue
            fi
            dest="${{ github.workspace }}/../${name}"
            echo "Restoring ${name}@${sha}"
            rm -rf "$dest"
            git clone --no-checkout --filter=blob:none \
              "https://x-access-token:${TOKEN}@github.com/metacraft-labs/${name}.git" \
              "$dest"
            git -C "$dest" fetch --depth 1 origin "$sha"
            git -C "$dest" checkout --detach "$sha"
            echo "${name}: $(git -C "$dest" rev-parse HEAD)"
            if [[ "$(git -C "$dest" rev-parse HEAD)" != "$sha" ]]; then
              echo "${name} did not restore to pinned SHA ${sha}" >&2
              exit 1
            fi
          done < "$PINS"

      - name: Run visual replay regression gate
        env:
          CODETRACER_VISUAL_REPLAY_REPO_PATH: ${{ github.workspace }}/../codetracer-visual-replay
          PLAYWRIGHT_GLOBAL_TIMEOUT: "10800000"
        run: |
          nix develop .#devShells.x86_64-linux.default --command just test-visual-replay-gate

      - name: Stage sibling artifacts into workspace
        # actions/upload-artifact@v5 forbids paths containing ``..``
        # and absolute paths outside the workspace, so the previous
        # config aborted with ``Invalid pattern '../codetracer-visual-replay/...':
        # Relative pathing '.' and '..' is not allowed``.  Copy any
        # sibling and /tmp artifacts into a workspace staging dir so
        # the upload step can reference them via workspace-relative
        # globs.
        if: failure()
        shell: bash
        run: |
          set -uo pipefail
          STAGE="visual-replay-regression-staging"
          mkdir -p "${STAGE}/sibling/tests/output" \
                   "${STAGE}/sibling/bench-results" \
                   "${STAGE}/tmp"
          if [ -d ../codetracer-visual-replay/tests/output ]; then
            cp -a ../codetracer-visual-replay/tests/output/. \
                  "${STAGE}/sibling/tests/output/" 2>/dev/null || true
          fi
          if [ -d ../codetracer-visual-replay/bench-results ]; then
            cp -a ../codetracer-visual-replay/bench-results/. \
                  "${STAGE}/sibling/bench-results/" 2>/dev/null || true
          fi
          shopt -s nullglob
          for f in /tmp/*_diff.rgba /tmp/*_sw.rgba /tmp/*_hw.rgba; do
            cp -a "$f" "${STAGE}/tmp/" 2>/dev/null || true
          done

      - name: Upload visual replay artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: visual-replay-regression-artifacts
          path: |
            src/tests/gui/test-results/
            src/tests/gui/playwright-report/
            src/tests/gui/test-stats/
            storybook/storybook-static/
            storybook/dist/
            visual-replay-regression-staging/
          retention-days: 14
          if-no-files-found: ignore

  publish-pypi:
    needs:
      - build-python-packages
      - test-non-gui
      - test-ui-tests
      - create-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages_dir: dist
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages_dir: dist

  push-to-cachix:
    runs-on: [self-hosted, nixos]
    needs:
      - test-non-gui
      - test-ui-tests
      - appimage-lib-check
      - dmg-lib-check
    if: "github.ref == 'refs/heads/main' && ${{ !github.event.codetracer-ci }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - run: "nix develop .#devShells.x86_64-linux.default --command ./ci/deploy/build-nix-and-push-to-cachix.sh"

  build-and-deploy-docs:
    runs-on: [self-hosted, nixos]
    needs: [push-to-cachix]
    if: ${{ github.ref == 'refs/heads/main' && !github.event['codetracer-ci'] }}
    permissions:
      contents: "write"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config init.defaultBranch main

          git remote set-url origin https://x-access-token:${{ secrets.CODETRACER_PUSH_GITHUB_TOKEN }}@github.com/metacraft-labs/codetracer

          nix develop .#devShells.x86_64-linux.default --command ./ci/deploy/docs.sh

  push-tag:
    runs-on: [ self-hosted, nixos ]
    needs: [ dev-build, nix-build, appimage-build, dmg-build ]
    permissions:
      contents: "write"
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}
      - name: Install Nix
        uses: metacraft-labs/nixos-modules/.github/install-nix@main
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}

      - name: Configure Nix for private repos
        run: |
          mkdir -p ~/.config/nix
          echo "access-tokens = github.com=${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}" >> ~/.config/nix/nix.conf
          git config --global url."https://x-access-token:${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}@github.com/".insteadOf "https://github.com/"

      - name: Create tag
        if: ${{ github.ref == 'refs/heads/main' }}
        id: tag
        run: |
          YEAR=$(bash -c 'grep "CodeTracerYear\*" src/ct/version.nim | sed "s/.*CodeTracerYear\* = //g"')
          MONTH=$(bash -c "printf '%02d' \$(grep \"CodeTracerMonth\*\" src/ct/version.nim | sed \"s/.*CodeTracerMonth\* = //g\")")
          BUILD=$(bash -c 'grep "CodeTracerBuild\*" src/ct/version.nim | sed "s/.*CodeTracerBuild\* = //g"')

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config init.defaultBranch main

          git remote set-url origin https://x-access-token:${{ secrets.CODETRACER_PUSH_GITHUB_TOKEN }}@github.com/metacraft-labs/codetracer

          git tag -a "$YEAR.$MONTH.$BUILD" -m "Release $YEAR.$MONTH.$BUILD" || echo "Tag already exists"
          (git push origin "$YEAR.$MONTH.$BUILD" && echo "tag=$YEAR.$MONTH.$BUILD" >> $GITHUB_OUTPUT) || echo "Tag already exists"

  create-release:
    runs-on: [ self-hosted, nixos ]
    needs: [ push-tag ]
    if: ${{ ((startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')) || needs.push-tag.outputs.tag != '') && !github.event['codetracer-ci'] }}
    permissions:
      contents: "write"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}
      - name: Install Nix
        uses: metacraft-labs/nixos-modules/.github/install-nix@main
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}

      - name: Configure Nix for private repos
        run: |
          mkdir -p ~/.config/nix
          echo "access-tokens = github.com=${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}" >> ~/.config/nix/nix.conf
          git config --global url."https://x-access-token:${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}@github.com/".insteadOf "https://github.com/"

      - name: "Import GPG key for signing commits"
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.CODETRACER_AUR_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.CODETRACER_AUR_GPG_PRIVATE_KEY_PASS }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true
      - name: Create resource tarball
        run: |
          nix develop .#devShells.x86_64-linux.default --command bash -c "tar cfJ resources.tar.xz resources/"
          nix develop .#devShells.x86_64-linux.default --command bash -c "gpg --detach-sign resources.tar.xz"
      - name: Upload latest
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_CODETRACER_BUCKET_ACCESS_KEY }}
        run: |
          nix develop .#devShells.x86_64-linux.default --command wget "https://downloads.codetracer.com/CodeTracer-main-arm64.dmg"
          nix develop .#devShells.x86_64-linux.default --command wget "https://downloads.codetracer.com/CodeTracer-main-arm64.dmg.asc"
          nix develop .#devShells.x86_64-linux.default --command wget "https://downloads.codetracer.com/CodeTracer-main-amd64.AppImage"
          nix develop .#devShells.x86_64-linux.default --command wget "https://downloads.codetracer.com/CodeTracer-main-amd64.AppImage.asc"

          nix develop .#devShells.x86_64-linux.default --command aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp CodeTracer-main-arm64.dmg s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-${{ needs.push-tag.outputs.tag }}-arm64.dmg --checksum-algorithm CRC32
          nix develop .#devShells.x86_64-linux.default --command aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp CodeTracer-main-arm64.dmg.asc s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-${{ needs.push-tag.outputs.tag }}-arm64.dmg.asc --checksum-algorithm CRC32
          nix develop .#devShells.x86_64-linux.default --command aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp CodeTracer-main-amd64.AppImage s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-${{ needs.push-tag.outputs.tag }}-amd64.AppImage --checksum-algorithm CRC32
          nix develop .#devShells.x86_64-linux.default --command aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp CodeTracer-main-amd64.AppImage.asc s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-${{ needs.push-tag.outputs.tag }}-amd64.AppImage.asc --checksum-algorithm CRC32

          nix develop .#devShells.x86_64-linux.default --command aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp CodeTracer-main-arm64.dmg s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-latest-arm64.dmg --checksum-algorithm CRC32
          nix develop .#devShells.x86_64-linux.default --command aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp CodeTracer-main-arm64.dmg.asc s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-latest-arm64.dmg.asc --checksum-algorithm CRC32
          nix develop .#devShells.x86_64-linux.default --command aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp CodeTracer-main-amd64.AppImage s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-latest-amd64.AppImage --checksum-algorithm CRC32
          nix develop .#devShells.x86_64-linux.default --command aws --endpoint-url=${{ secrets.R2_CODETRACER_BUCKET_S3_ENDPOINT }} s3 cp CodeTracer-main-amd64.AppImage.asc s3://${{ vars.R2_CODETRACER_BUCKET_NAME }}/CodeTracer-latest-amd64.AppImage.asc --checksum-algorithm CRC32

      - name: Get changelog text
        id: changelog
        run: |
          nix develop .#devShells.x86_64-linux.default --command bash -c "awk '/^## /{if (p) exit; p=1} p' CHANGELOG.md > release_changelog.md"
          echo "\

          We're actively working on multiple exciting features, which are not fully released yet. Stay tuned!

          Available downloads:

          <a href="https://downloads.codetracer.com/CodeTracer-${{ needs.push-tag.outputs.tag }}-arm64.dmg"><img width="75px" height="100px" src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Apple_logo_grey.svg"></a>
          <a href="https://deb.codetracer.com/"><img width="100px" height="100px" src="https://upload.wikimedia.org/wikipedia/commons/9/9e/UbuntuCoF.svg"></a>
          <a href="https://deb.codetracer.com/"><img width="100px" height="100px" src="https://upload.wikimedia.org/wikipedia/commons/6/66/Openlogo-debianV2.svg"></a>
          <a href="https://rpm.codetracer.com/"><img width="100px" height="100px" src="https://upload.wikimedia.org/wikipedia/commons/d/d8/Red_Hat_logo.svg"></a>
          <a href="https://rpm.codetracer.com/"><img width="100px" height="100px" src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Fedora_logo.svg"></a>
          <a href="https://github.com/metacraft-labs/metacraft-overlay"><img width="100px" height="100px" src="https://upload.wikimedia.org/wikipedia/commons/4/48/Gentoo_Linux_logo_matte.svg"></a>
          <a href="https://aur.archlinux.org/packages/codetracer"><img width="100px" height="100px" src="https://upload.wikimedia.org/wikipedia/commons/1/13/Arch_Linux_%22Crystal%22_icon.svg"></a>
          <a href="https://downloads.codetracer.com/CodeTracer-${{ needs.push-tag.outputs.tag }}-amd64.AppImage"><img width="100px" height="100px" src="https://upload.wikimedia.org/wikipedia/commons/7/73/App-image-logo.svg"></a>

          Key signatures:

          [![Download macOS Signature](https://img.shields.io/badge/Download-macOS%20Signature-blue?style=for-the-badge)](https://downloads.codetracer.com/CodeTracer-${{ needs.push-tag.outputs.tag }}-arm64.dmg.asc)
          [![Download AppImage Signature](https://img.shields.io/badge/Download-AppImage%20Signature-blue?style=for-the-badge)](https://downloads.codetracer.com/CodeTracer-${{ needs.push-tag.outputs.tag }}-amd64.AppImage.asc)
          [![Download PGP Key](https://img.shields.io/badge/Download-PGP%20key-blue?style=for-the-badge)](https://downloads.codetracer.com/CodeTracer.pub.asc)" >> release_changelog.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: "release_changelog.md"
          draft: true
          prerelease: false
          files: |
            resources.tar.xz
            resources.tar.xz.asc
          generate_release_notes: false
          tag_name: "${{ needs.push-tag.outputs.tag }}"
