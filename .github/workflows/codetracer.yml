name: Codetracer CI
on:
  push:
    branches:
      - main
      - dev
      - stable
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  # NOTE (CIP-5 Wave 4): the whole Windows platform was migrated as a single
  # unit (honoring the prior "move the whole platform or none of it" rule) from
  # the GitHub-hosted `windows-latest` onto the self-hosted `eph-win-x64`
  # class, now that it is provisioned. These jobs keep their DIY env.ps1
  # (`windows-diy`) toolchain path unchanged — only the runner label moved;
  # `eph-win-x64` is the DIY-Windows runner. `eph-win-arm64` is intentionally NOT
  # added here (env.ps1 ARM support is unverified in CI and that class still
  # queues); revisit once eph-win-arm64 is live.
  windows-bootstrap-smoke:
    runs-on: eph-win-x64  # CIP-5: DIY-Windows (env.ps1) -> eph-win-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate env.sh syntax
        shell: bash
        run: |
          set -euo pipefail
          test -f env.sh
          bash -n env.sh

      - name: Validate PowerShell parser
        shell: pwsh
        run: |
          $scriptPaths = @(
            "env.ps1",
            "non-nix-build/windows/toolchain-utils.ps1",
            "non-nix-build/windows/ensure-rust.ps1",
            "non-nix-build/windows/ensure-just.ps1",
            "non-nix-build/windows/ensure-nextest.ps1",
            "non-nix-build/windows/ensure-node.ps1",
            "non-nix-build/windows/ensure-uv.ps1",
            "non-nix-build/windows/ensure-nim.ps1",
            "non-nix-build/windows/ensure-capnp.ps1",
            "non-nix-build/windows/ensure-tup.ps1",
            "non-nix-build/windows/ensure-ct-remote.ps1",
            "non-nix-build/windows/ensure-nargo.ps1",
            "non-nix-build/windows/ensure-ttd.ps1",
            "non-nix-build/windows/validate-toolchain-versions.ps1",
            "non-nix-build/windows/validate-env-path-entries.ps1"
          )

          foreach ($scriptPath in $scriptPaths) {
            if (-not (Test-Path -LiteralPath $scriptPath)) {
              throw "Missing required file: $scriptPath"
            }

            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $scriptPath,
              [ref]$null,
              [ref]$parseErrors
            )

            if ($parseErrors.Count -gt 0) {
              $parseErrors | ForEach-Object { Write-Error "${scriptPath}: $($_.Message)" }
              throw "PowerShell parser reported one or more errors."
            }
          }

      - name: Validate toolchain-versions.env
        shell: pwsh
        run: |
          pwsh -File non-nix-build/windows/validate-toolchain-versions.ps1

      - name: Validate env.ps1 PATH helper
        shell: pwsh
        run: |
          pwsh -File non-nix-build/windows/validate-env-path-entries.ps1

      - name: Validate arm64 mode routing smoke checks
        shell: pwsh
        run: |
          $windowsDir = "non-nix-build/windows"

          function Invoke-BootstrapProbe {
            param(
              [Parameter(Mandatory = $true)][string]$Name,
              [Parameter(Mandatory = $true)][hashtable]$Env,
              [Parameter(Mandatory = $true)][scriptblock]$Action,
              [Parameter(Mandatory = $true)][string[]]$RequiredPatterns,
              [string[]]$ForbiddenPatterns = @()
            )

            $installRoot = Join-Path $env:RUNNER_TEMP ("codetracer-bootstrap-routing-" + $Name)
            if (Test-Path -LiteralPath $installRoot) {
              Remove-Item -LiteralPath $installRoot -Recurse -Force
            }
            New-Item -ItemType Directory -Path $installRoot -Force | Out-Null

            $savedPath = $env:PATH
            $savedArchOverride = $env:WINDOWS_DIY_ARCH_OVERRIDE
            $savedEnv = @{}
            foreach ($envKey in $Env.Keys) {
              $savedEnv[$envKey] = [Environment]::GetEnvironmentVariable($envKey)
              [Environment]::SetEnvironmentVariable($envKey, [string]$Env[$envKey])
            }

            [Environment]::SetEnvironmentVariable("WINDOWS_DIY_ARCH_OVERRIDE", "arm64")
            $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot"
            $probeOutput = @()
            try {
              $probeSucceeded = $true
              $probeOutput = & $Action $installRoot 2>&1
            } catch {
              $probeSucceeded = $false
              $probeOutput = @($probeOutput) + $_.Exception.Message + ($_ | Out-String -Width 10000)
            } finally {
              $env:PATH = $savedPath
              [Environment]::SetEnvironmentVariable("WINDOWS_DIY_ARCH_OVERRIDE", $savedArchOverride)
              foreach ($envKey in $Env.Keys) {
                [Environment]::SetEnvironmentVariable($envKey, $savedEnv[$envKey])
              }
            }

            $probeText = ($probeOutput | Out-String -Width 10000)
            if ($probeSucceeded) {
              throw "Probe '$Name' unexpectedly succeeded. Expected a fast-fail source-route assertion."
            }

            foreach ($pattern in $RequiredPatterns) {
              if ($probeText -notmatch $pattern) {
                throw "Probe '$Name' output is missing required pattern '$pattern'."
              }
            }

            foreach ($pattern in $ForbiddenPatterns) {
              if ($probeText -match $pattern) {
                throw "Probe '$Name' output matched forbidden pattern '$pattern'."
              }
            }
          }

          # Load shared modules
          . "$windowsDir/toolchain-utils.ps1"
          . "$windowsDir/ensure-nim.ps1"
          . "$windowsDir/ensure-capnp.ps1"
          . "$windowsDir/ensure-ct-remote.ps1"

          # Parse toolchain versions
          $toolchainPath = Join-Path $windowsDir "toolchain-versions.env"
          $toolchain = @{}
          foreach ($line in Get-Content -LiteralPath $toolchainPath) {
            if ($line -match '^\s*#' -or [string]::IsNullOrWhiteSpace($line)) { continue }
            if ($line -notmatch '^\s*([A-Za-z_][A-Za-z0-9_]*)=(.*)$') { continue }
            $name = $matches[1]
            $value = $matches[2].Trim()
            if ($value.StartsWith('"') -and $value.EndsWith('"') -and $value.Length -ge 2) {
              $value = $value.Substring(1, $value.Length - 2)
            }
            $toolchain[$name] = $value
          }

          Invoke-BootstrapProbe `
            -Name "nim-auto-arm64-source-first" `
            -Env @{
              "NIM_WINDOWS_SOURCE_MODE" = "auto"
            } `
            -Action {
              param($installRoot)
              $arch = Get-WindowsArch
              Ensure-Nim -Root $installRoot -Arch $arch -Toolchain $toolchain
            } `
            -RequiredPatterns @(
              "NIM_WINDOWS_SOURCE_MODE=auto attempted Nim source bootstrap on 'arm64' and failed:",
              "Prebuilt fallback is x64-only"
            ) `
            -ForbiddenPatterns @(
              "Falling back to pinned prebuilt asset",
              "NIM_WINDOWS_SOURCE_MODE=prebuilt"
            )

          Invoke-BootstrapProbe `
            -Name "capnp-auto-arm64-source-route" `
            -Env @{
              "CAPNP_WINDOWS_SOURCE_MODE" = "auto"
            } `
            -Action {
              param($installRoot)
              $arch = Get-WindowsArch
              Ensure-Capnp -Root $installRoot -Arch $arch -Toolchain $toolchain
            } `
            -RequiredPatterns @(
              "git is required for source bootstrap but was not found on PATH"
            ) `
            -ForbiddenPatterns @(
              "capnproto-c\\+\\+-win32-"
            )

          Invoke-BootstrapProbe `
            -Name "ct-remote-auto-arm64-local-route" `
            -Env @{
              "CT_REMOTE_WINDOWS_SOURCE_MODE" = "auto"
              "CT_REMOTE_WINDOWS_SOURCE_REPO" = (Join-Path $env:RUNNER_TEMP "codetracer-ci-missing-routes")
            } `
            -Action {
              param($installRoot)
              $arch = Get-WindowsArch
              Ensure-CtRemote -Root $installRoot -Arch $arch -Toolchain $toolchain -WindowsDir $windowsDir
            } `
            -RequiredPatterns @(
              "CT_REMOTE_WINDOWS_SOURCE_MODE=auto on 'arm64' requires local source project",
              "Pinned download is x64-only"
            ) `
            -ForbiddenPatterns @(
              "Installing ct-remote from pinned download",
              "Falling back to pinned download"
            )

  # M13: Windows materialized origin-DAP verification. The per-PR job runs the
  # seven substantive Python scenarios against the locked Rust-backed Python
  # recorder. Rust TTD and MCP/CLI coverage remain follow-up work and are not
  # exercised or claimed by this job.
  #
  # Spec: codetracer-specs/Planned-Features/Value-Origin-Tracking.milestones.org §M13.
  origin-dap-windows:
    runs-on: eph-win-x64  # CIP-5: DIY-Windows (env.ps1) -> eph-win-x64
    name: origin-DAP (materialized Python, Windows)
    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup db-backend siblings
        uses: ./.github/actions/setup-db-backend-siblings
        with:
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install capnproto
        shell: pwsh
        run: choco install capnproto -y

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read locked Python recorder revision
        id: python-recorder-lock
        shell: pwsh
        run: |
          $lock = Get-Content -Raw flake.lock | ConvertFrom-Json
          $revision = $lock.nodes.'codetracer-python-recorder'.locked.rev
          if ($revision -notmatch '^[0-9a-f]{40}$') {
            throw "flake.lock does not contain a valid codetracer-python-recorder revision"
          }
          "revision=$revision" >> $env:GITHUB_OUTPUT

      - name: Checkout locked Python recorder adjacent to CodeTracer
        shell: pwsh
        env:
          RECORDER_REVISION: ${{ steps.python-recorder-lock.outputs.revision }}
          SIBLING_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          $destination = Join-Path $env:GITHUB_WORKSPACE "..\codetracer-python-recorder"
          $credentials = [Convert]::ToBase64String(
            [Text.Encoding]::ASCII.GetBytes("x-access-token:$env:SIBLING_TOKEN")
          )
          if (Test-Path $destination) {
            Remove-Item -Recurse -Force $destination
          }
          New-Item -ItemType Directory -Force -Path $destination | Out-Null
          git -C $destination init
          git -C $destination remote add origin `
            https://github.com/metacraft-labs/codetracer-python-recorder.git
          git -C $destination `
            -c "http.extraHeader=AUTHORIZATION: basic $credentials" `
            fetch --depth=1 origin $env:RECORDER_REVISION
          git -C $destination checkout --detach FETCH_HEAD
          if ((git -C $destination rev-parse HEAD).Trim() -ne $env:RECORDER_REVISION) {
            throw "the adjacent Python recorder checkout does not match flake.lock"
          }

      - name: Install Nim toolchain
        shell: pwsh
        run: |
          choco install nim -y
          $nimBin = (Get-ChildItem -Path "C:\tools\Nim\nim-*\bin" -Directory | Select-Object -First 1).FullName
          if ($nimBin) { Add-Content -Path $env:GITHUB_PATH -Value $nimBin }
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.nimble\bin"

      - name: Install and verify locked Rust-backed Python recorder
        shell: pwsh
        run: |
          $python = (Get-Command python -ErrorAction Stop).Source
          $recorder = Join-Path $env:GITHUB_WORKSPACE `
            "..\codetracer-python-recorder\codetracer-python-recorder"
          $stewRoot = (Resolve-Path "$env:GITHUB_WORKSPACE\libs\nim-stew").Path.Replace('\', '/')
          $nimPathConfig = @(
            "--path:`"$stewRoot/stew`""
            "--path:`"$stewRoot`""
          )
          foreach ($nimConfigDir in @(
            (Join-Path $env:APPDATA "nim"),
            (Join-Path $env:USERPROFILE ".config\nim")
          )) {
            New-Item -ItemType Directory -Force -Path $nimConfigDir | Out-Null
            $nimPathConfig | Add-Content -Path (Join-Path $nimConfigDir "nim.cfg")
          }
          $env:CODETRACER_TRACE_FORMAT_NIM_SKIP_NIMBLE_INSTALL = "1"
          & $python -m pip install --disable-pip-version-check $recorder
          if ($LASTEXITCODE -ne 0) { throw "failed to install the locked Python recorder" }
          & $python -c "import codetracer_python_recorder"
          if ($LASTEXITCODE -ne 0) { throw "the locked Python recorder is not importable" }
          "CODETRACER_PYTHON_CMD=$python" >> $env:GITHUB_ENV

      - name: Prefer Git Bash over WSL bash stub
        shell: pwsh
        run: |
          $wslStub = "$env:SystemRoot\System32\bash.exe"
          if (Test-Path $wslStub) {
            takeown /f $wslStub | Out-Null
            icacls $wslStub /grant "Administrators:(F)" | Out-Null
            Remove-Item -Force $wslStub
          }
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\Git\bin"

      - name: Generate tree-sitter-nim parser
        shell: pwsh
        run: |
          npm install -g tree-sitter-cli
          cd libs/tree-sitter-nim
          tree-sitter generate

      - name: Install just
        shell: pwsh
        run: |
          choco install just -y
          just --version

      - name: Run required materialized Python origin-DAP gate
        shell: bash
        env:
          CT_EMULATOR_EXTRA_NIM_PATHS: ${{ github.workspace }}/libs/nim-stew/stew:${{ github.workspace }}/libs/nim-stew:${{ github.workspace }}/libs/nim-result
          CT_ORIGIN_DAP_REQUIRED: "1"
          CT_TEST_LANGS: python
        run: just test-origin-dap

  # M13: Definition of the eventual Windows nightly routed matrix. In this
  # target, `all` means only Python, Ruby and JavaScript, matching
  # test-origin-dap's strict router. It does not include or claim Rust TTD,
  # other languages, or MCP/CLI. This workflow currently has only push and PR
  # triggers, so the guarded job remains inactive until a scheduled or manual
  # trigger is added deliberately.
  origin-dap-windows-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: eph-win-x64  # CIP-5: DIY-Windows (env.ps1) -> eph-win-x64
    name: origin-DAP (nightly routed materialized matrix, Windows)
    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup db-backend siblings
        uses: ./.github/actions/setup-db-backend-siblings
        with:
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install capnproto
        shell: pwsh
        run: choco install capnproto -y

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read locked Python recorder revision
        id: python-recorder-lock
        shell: pwsh
        run: |
          $lock = Get-Content -Raw flake.lock | ConvertFrom-Json
          $revision = $lock.nodes.'codetracer-python-recorder'.locked.rev
          if ($revision -notmatch '^[0-9a-f]{40}$') {
            throw "flake.lock does not contain a valid codetracer-python-recorder revision"
          }
          "revision=$revision" >> $env:GITHUB_OUTPUT

      - name: Checkout locked Python recorder adjacent to CodeTracer
        shell: pwsh
        env:
          RECORDER_REVISION: ${{ steps.python-recorder-lock.outputs.revision }}
          SIBLING_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          $destination = Join-Path $env:GITHUB_WORKSPACE "..\codetracer-python-recorder"
          $credentials = [Convert]::ToBase64String(
            [Text.Encoding]::ASCII.GetBytes("x-access-token:$env:SIBLING_TOKEN")
          )
          if (Test-Path $destination) {
            Remove-Item -Recurse -Force $destination
          }
          New-Item -ItemType Directory -Force -Path $destination | Out-Null
          git -C $destination init
          git -C $destination remote add origin `
            https://github.com/metacraft-labs/codetracer-python-recorder.git
          git -C $destination `
            -c "http.extraHeader=AUTHORIZATION: basic $credentials" `
            fetch --depth=1 origin $env:RECORDER_REVISION
          git -C $destination checkout --detach FETCH_HEAD
          if ((git -C $destination rev-parse HEAD).Trim() -ne $env:RECORDER_REVISION) {
            throw "the adjacent Python recorder checkout does not match flake.lock"
          }

      - name: Install Nim toolchain
        shell: pwsh
        run: |
          choco install nim -y
          $nimBin = (Get-ChildItem -Path "C:\tools\Nim\nim-*\bin" -Directory | Select-Object -First 1).FullName
          if ($nimBin) { Add-Content -Path $env:GITHUB_PATH -Value $nimBin }
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.nimble\bin"

      - name: Install and verify locked Rust-backed Python recorder
        shell: pwsh
        run: |
          $python = (Get-Command python -ErrorAction Stop).Source
          $recorder = Join-Path $env:GITHUB_WORKSPACE `
            "..\codetracer-python-recorder\codetracer-python-recorder"
          $stewRoot = (Resolve-Path "$env:GITHUB_WORKSPACE\libs\nim-stew").Path.Replace('\', '/')
          $nimPathConfig = @(
            "--path:`"$stewRoot/stew`""
            "--path:`"$stewRoot`""
          )
          foreach ($nimConfigDir in @(
            (Join-Path $env:APPDATA "nim"),
            (Join-Path $env:USERPROFILE ".config\nim")
          )) {
            New-Item -ItemType Directory -Force -Path $nimConfigDir | Out-Null
            $nimPathConfig | Add-Content -Path (Join-Path $nimConfigDir "nim.cfg")
          }
          $env:CODETRACER_TRACE_FORMAT_NIM_SKIP_NIMBLE_INSTALL = "1"
          & $python -m pip install --disable-pip-version-check $recorder
          if ($LASTEXITCODE -ne 0) { throw "failed to install the locked Python recorder" }
          & $python -c "import codetracer_python_recorder"
          if ($LASTEXITCODE -ne 0) { throw "the locked Python recorder is not importable" }
          "CODETRACER_PYTHON_CMD=$python" >> $env:GITHUB_ENV

      - name: Prefer Git Bash over WSL bash stub
        shell: pwsh
        run: |
          $wslStub = "$env:SystemRoot\System32\bash.exe"
          if (Test-Path $wslStub) {
            takeown /f $wslStub | Out-Null
            icacls $wslStub /grant "Administrators:(F)" | Out-Null
            Remove-Item -Force $wslStub
          }
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\Git\bin"

      - name: Generate tree-sitter-nim parser
        shell: pwsh
        run: |
          npm install -g tree-sitter-cli
          cd libs/tree-sitter-nim
          tree-sitter generate

      - name: Install just
        shell: pwsh
        run: |
          choco install just -y
          just --version

      - name: Run routed materialized origin-DAP matrix
        shell: bash
        env:
          CT_EMULATOR_EXTRA_NIM_PATHS: ${{ github.workspace }}/libs/nim-stew/stew:${{ github.workspace }}/libs/nim-stew:${{ github.workspace }}/libs/nim-result
          CT_TEST_LANGS: all
        run: just test-origin-dap

  windows-named-pipe-tests:
    runs-on: eph-win-x64  # CIP-5: DIY-Windows (env.ps1) -> eph-win-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Windows named-pipe transport tests
        working-directory: src/tui
        shell: pwsh
        run: cargo test --bin simple-tui windows_named_pipe -- --nocapture

  windows-rust-components:
    runs-on: eph-win-x64  # CIP-5: DIY-Windows (env.ps1) -> eph-win-x64
    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup dev env
        # setup-dev-env (windows-diy) clones the cross-repo siblings adjacent
        # to this checkout at the workspace-lock-pinned revisions and sources
        # env.ps1, whose ensure-* helpers provision the Windows toolchain
        # (capnp / cargo / nim / nimble), persisting the env to GITHUB_ENV /
        # GITHUB_PATH for subsequent steps. This replaces the former
        # Checkout-manifests / Resolve-lock / per-sibling clone-repo steps AND
        # the open-coded toolchain installs (dtolnay rust-toolchain, choco
        # capnproto, choco nim).
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: windows-diy
          gh-token: ${{ steps.app-token.outputs.token }}
          siblings: |
            codetracer-trace-format
            codetracer-trace-format-nim
            codetracer-native-recorder

      - name: Remove WSL bash stub from System32
        # db-backend's build.rs runs ``Command::new("bash") ...
        # build_native_api.sh`` on Windows.  Rust's
        # ``Command::new`` uses ``CreateProcessW``, whose documented
        # lookup order checks ``C:\Windows\System32`` BEFORE PATH.
        # On windows-latest that directory contains a WSL launcher
        # stub (``bash.exe``) which aborts with ``Windows Subsystem
        # for Linux has no installed distributions``.  Even after
        # prepending Git Bash to PATH the WSL stub still wins.
        #
        # We don't need WSL on this runner -- removing the stub
        # lets CreateProcessW fall through to Git for Windows'
        # ``bash.exe`` (added to PATH below), which is what the
        # build.rs comment ("Ensure Git for Windows bash is on
        # PATH") actually wants.
        shell: pwsh
        run: |
          $wslStub = "$env:SystemRoot\System32\bash.exe"
          if (Test-Path $wslStub) {
            takeown /f $wslStub | Out-Null
            icacls $wslStub /grant "Administrators:(F)" | Out-Null
            Remove-Item -Force $wslStub
          }
          # Add Git Bash bin dir so ``bash`` resolves to Git for Windows.
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\Git\bin"

      - name: Generate tree-sitter-nim parser
        shell: pwsh
        run: |
          npm install -g tree-sitter-cli
          cd libs/tree-sitter-nim
          tree-sitter generate

      - name: Build db-backend
        working-directory: src/db-backend
        shell: bash
        # The emulator's ``syscall_replay.nim`` imports
        # ``stew/endians2`` but ``ct_emulator.nimble`` doesn't list
        # ``stew`` as a dep, so on a fresh Windows runner Nim cannot
        # resolve the module.  The Nix derivation sets
        # ``CT_EMULATOR_EXTRA_NIM_PATHS`` to inject codetracer's
        # vendored ``libs/nim-stew``; mirror that here so
        # build_native_api.sh's ``--path:`` flags pick it up.
        env:
          CT_EMULATOR_EXTRA_NIM_PATHS: ${{ github.workspace }}/libs/nim-stew/stew:${{ github.workspace }}/libs/nim-stew:${{ github.workspace }}/libs/nim-result
        run: dev-exec cargo build

      - name: Test db-backend
        working-directory: src/db-backend
        shell: bash
        # build_native_api.sh has already produced the C files in
        # the Build step above; this env var only matters when
        # regeneration is required, but we leave it set so a stale
        # cache doesn't trigger a re-run that then fails for the
        # same path-resolution reason.
        env:
          CT_EMULATOR_EXTRA_NIM_PATHS: ${{ github.workspace }}/libs/nim-stew/stew:${{ github.workspace }}/libs/nim-stew:${{ github.workspace }}/libs/nim-result
          # ``ctfs_trace_reader::tests::bench_new_format_startup_time``
          # asserts new-format trace startup is under 200ms.  That
          # number is calibrated for a developer workstation; GitHub-
          # hosted ``windows-latest`` is consistently 2-3x slower
          # (we've observed 322ms cleanly).  Let CI assert against a
          # roomier threshold without weakening the dev-machine SLA.
          CT_BENCH_STARTUP_MS_THRESHOLD: "1000"
        # The *_flow_*  tests under tests/ are end-to-end integration
        # tests that drive sibling-language recorders through the DAP
        # wire protocol; they need both the recorder binaries AND a
        # matching language runtime (elixir/erlang/ruby/etc.) on the
        # runner image.  windows-latest has none of those installed --
        # the Cross-Repo Integration Tests workflow exercises the same
        # code paths on a Linux self-hosted runner with the recorders
        # + runtimes available.  Mirror the skip pattern used by the
        # db-backend Nix derivation in nix/packages/default.nix.
        run: |
          dev-exec cargo test -- \
            --skip ruby_flow_integration \
            --skip bash_flow_integration \
            --skip zsh_flow_integration \
            --skip javascript_flow_integration \
            --skip e2e_codetracer_elixir \
            --skip e2e_codetracer_erlang

      - name: Build backend-manager
        working-directory: src/backend-manager
        shell: bash
        run: dev-exec cargo build

      - name: Build tui
        working-directory: src/tui
        shell: bash
        run: dev-exec cargo build

      - name: Clippy db-backend
        working-directory: src/db-backend
        shell: bash
        # Same rationale as Build db-backend above: keep the path
        # variable set so any cached-state-invalidation triggers
        # a regeneration with stew on the import path.
        env:
          CT_EMULATOR_EXTRA_NIM_PATHS: ${{ github.workspace }}/libs/nim-stew/stew:${{ github.workspace }}/libs/nim-stew:${{ github.workspace }}/libs/nim-result
        run: dev-exec cargo clippy --all-targets -- -D warnings

      - name: Clippy backend-manager
        working-directory: src/backend-manager
        shell: bash
        run: dev-exec cargo clippy --all-targets -- -D warnings

      - name: Clippy tui
        working-directory: src/tui
        shell: bash
        run: dev-exec cargo clippy --all-targets -- -D warnings

      - name: Test tui named pipe
        working-directory: src/tui
        shell: bash
        run: dev-exec cargo test --bin simple-tui windows_named_pipe

  # Headless DAP test suite on Windows using MCR backend.
  # Installs all dependencies via env.ps1, builds ct-mcr from the
  # codetracer-native-recorder sibling, then runs the Rust DAP integration tests.
  windows-headless-test:
    runs-on: eph-win-x64  # CIP-5: DIY-Windows (env.ps1) -> eph-win-x64
    name: test (headless DAP, Windows)
    needs:
      - windows-rust-components
    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Disable TTD validation for the Windows DIY bootstrap
        # setup-dev-env (windows-diy) sources env.ps1 inside the composite;
        # surface the same WINDOWS_DIY_ENSURE_TTD=false the former bootstrap
        # step set so env.ps1 skips the slow TTD/WinDbg validation.
        shell: bash
        run: echo "WINDOWS_DIY_ENSURE_TTD=false" >> "$GITHUB_ENV"

      - name: Setup dev env
        # setup-dev-env clones the cross-repo siblings adjacent to this
        # checkout at the workspace-lock-pinned revisions and sources
        # env.ps1 (windows-diy flavor), persisting the resulting env to
        # GITHUB_ENV/GITHUB_PATH for subsequent steps — replacing the former
        # Checkout-manifests / Resolve-lock / per-sibling clone-repo steps
        # AND the hand-rolled "Bootstrap Windows dev environment" env-export
        # (the composite captures the full env.ps1 delta, a superset of the
        # vars that step exported by hand).
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: windows-diy
          gh-token: ${{ steps.app-token.outputs.token }}
          env-ps1-path: ./env.ps1
          siblings: |
            codetracer-native-recorder
            codetracer-trace-format
            codetracer-trace-format-nim

      - name: Install Nim dependencies
        shell: bash
        run: nimble install results stew -y

      - name: Build ct-mcr.exe
        shell: bash
        run: |
          cd "${{ github.workspace }}/../codetracer-native-recorder/ct_cli"
          nim c --cc:vcc \
            --path:../ct_time_model/src --path:../ct_events/src \
            --path:../ct_ringbuf/src --path:../ct_runtime/src \
            --path:../ct_recorder/src --path:../ct_replayer/src \
            --path:../ct_debugserver/src --path:../ct_trace_store/src \
            --path:../ct_interpose/src --path:../ct_instrument/src \
            --path:../ct_snapshot/src --path:../ct_sync/src \
            -o:ct_mcr.exe src/ct_cli.nim

      - name: Build ct_interpose.dll
        shell: bash
        run: |
          cd "${{ github.workspace }}/../codetracer-native-recorder"
          nim c --app:lib --cc:vcc --mm:orc \
            -o:ct_interpose/ct_interpose.dll \
            ct_interpose/src/ct_interpose/library_init_windows.nim

      - name: Build db-backend
        working-directory: src/db-backend
        shell: bash
        # Same CT_EMULATOR_EXTRA_NIM_PATHS rationale as the
        # windows-rust-components job above; without it
        # build_native_api.sh fails on a fresh runner with
        # ``cannot open file: stew/endians2``.
        env:
          CT_EMULATOR_EXTRA_NIM_PATHS: ${{ github.workspace }}/libs/nim-stew/stew:${{ github.workspace }}/libs/nim-stew:${{ github.workspace }}/libs/nim-result
        run: cargo build --release

      - name: Build backend-manager
        working-directory: src/backend-manager
        shell: bash
        run: cargo build --release

      - name: Run headless DAP tests (MCR backend)
        shell: bash
        env:
          CODETRACER_CT_MCR_CMD: ${{ github.workspace }}/../codetracer-native-recorder/ct_cli/ct_mcr.exe
          CODETRACER_ALLOW_GRACEFUL_TEST_SKIPPING: "false"
          CODETRACER_USE_GCC: "1"
          CODETRACER_GDB_CMD: gdb
          CODETRACER_GCC_CMD: gcc
          CODETRACER_GPP_CMD: g++
        working-directory: src/db-backend
        run: |
          cargo nextest run --release --test '*' \
            -E 'test(~dap) and not test(~bash_flow) and not test(~zsh_flow) and not test(~javascript_flow)'

