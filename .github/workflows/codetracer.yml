  lint-rust:
    runs-on: eph-linux-x64  # CIP-5: nix job (self-hosted nixos) -> eph-linux-x64
    steps:
      - name: Mint installation token for cross-repo sibling access
        # GitHub free plan restricts org-level secrets with visibility
        # ALL from being readable inside private repos, so we mint
        # per-run installation tokens from the repo-local
        # CI_TOKEN_PROVIDER_APP_ID + CI_TOKEN_PROVIDER_PRIVATE_KEY
        # secrets via the CI Token Provider GitHub App.
        id: ci_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.ci_token.outputs.token }}

      - name: Setup dev env
        # setup-dev-env installs Nix (with the Attic substituter/keys) and
        # clones the cross-repo siblings adjacent to this checkout at the
        # workspace-lock-pinned revisions, replacing the former
        # Checkout-manifests / Resolve-lock / per-sibling clone-repo / Install
        # Nix steps. The direnv-allow + ct_emulator nimble steps below remain
        # bespoke because they operate inside the cloned native-recorder
        # sibling's own dev env.
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.app-token.outputs.token }}
          substituters: ${{ vars.ATTIC_SUBSTITUTER }}
          trusted-public-keys: ${{ vars.ATTIC_TRUSTED_PUBLIC_KEY }}
          siblings: |
            codetracer-trace-format
            codetracer-trace-format-nim
            codetracer-native-recorder

      - name: Allow direnv in cloned codetracer-native-recorder
        # src/db-backend/build.rs invokes ``direnv exec <recorder-root>
        # bash ct_emulator/build_native_api.sh`` to materialise the
        # generated C sources before the Rust build.  A fresh clone has
        # its .envrc in the "blocked" state, so direnv refuses to run
        # and the build script panics with ``build_native_api.sh exited
        # with status exit status: 1``.  ``direnv allow`` is idempotent
        # and only persists in the local direnv state dir on this
        # self-hosted runner.
        run: |
          nix develop .#devShells.x86_64-linux.default -c \
            direnv allow "${{ github.workspace }}/../codetracer-native-recorder"

      - name: Resolve ct_emulator nimble dependencies
        # build_native_api.sh runs ``nim c ... ct_emulator.nim``
        # whose .nimble declares ``requires "results"``.  A fresh
        # nim install has no global ``results`` package, so the
        # script aborts with ``cannot open file: results``.  Run
        # ``nimble install --depsOnly`` once in ct_emulator (inside
        # the recorder's direnv env so nim/nimble resolve from the
        # recorder's flake) -- idempotent, mirrors what
        # codetracer_trace_writer_nim's build.rs does in the trace-
        # format crate.
        run: |
          nix develop .#devShells.x86_64-linux.default -c \
            direnv exec "${{ github.workspace }}/../codetracer-native-recorder" \
              bash -c 'cd "${{ github.workspace }}/../codetracer-native-recorder/ct_emulator" && nimble install --depsOnly -y'

      # The emulator's ``syscall_replay.nim`` imports ``stew/endians2``
      # but ``ct_emulator.nimble`` doesn't list ``stew`` as a dep, so a
      # fresh Nim build cannot resolve the module.  Codetracer ships its
      # own pinned copy as a submodule under ``libs/nim-stew``; inject
      # it via ``CT_EMULATOR_EXTRA_NIM_PATHS`` so build_native_api.sh's
      # ``--path:`` flags pick it up.  Same env-var the windows-rust-
      # components job (line 460) and the macOS db-backend test job
      # (line 472) already use.  Required because build.rs's wipe-
      # before-regen (commit 601cf357) means we no longer rely on a
      # stale cached @memulator_wasm_api.nim.c surviving from prior runs.
      - name: Run rust lints
        env:
          CT_EMULATOR_EXTRA_NIM_PATHS: ${{ github.workspace }}/libs/nim-stew/stew:${{ github.workspace }}/libs/nim-stew:${{ github.workspace }}/libs/nim-result
        run: nix develop .#devShells.x86_64-linux.default -c ./ci/lint/rust.sh

