  build-python-packages:
    needs:
      - lint-bash
      - lint-nim
      - lint-nix
      - lint-rust

    # TODO: migrate the matrix to self-hosted runners once the apt-get install
    # libssl-dev / libbpf-dev / libelf-dev / zlib1g-dev steps and the manual
    # nim/openssl/zlib downloads are replaced with nix equivalents. The macos
    # legs additionally need a self-hosted macOS Intel runner (we only have
    # aarch64-darwin self-hosted hosts today).
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest  # HOLD (CIP-5 Wave 4): STEP-RISKY DIY (apt/nim-from-source) — see job TODO
            target_os: linux
            arch: amd64
            plat_name: manylinux_2_17_x86_64
          # - name: linux-arm64
          #   runner: ubuntu-22.04-arm64
          #   target_os: linux
          #   arch: arm64
          #   plat_name: manylinux_2_17_aarch64

          - name: macos-amd64
            runner: macos-15-intel  # HOLD (CIP-5 Wave 4): DIY macOS release build — see job TODO
            target_os: macos
            arch: amd64
            plat_name: macosx_10_9_x86_64
          - name: macos-arm64
            runner: macos-14  # HOLD (CIP-5 Wave 4): DIY macOS release build — see job TODO
            target_os: macos
            arch: arm64
            plat_name: macosx_11_0_arm64

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Mint installation token for cross-repo sibling access
        # GitHub free plan restricts org-level secrets with visibility
        # ALL from being readable inside private repos, so we mint
        # per-run installation tokens from the repo-local
        # CI_TOKEN_PROVIDER_APP_ID + CI_TOKEN_PROVIDER_PRIVATE_KEY
        # secrets via the CI Token Provider GitHub App.
        id: ci_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: 'true'
          token: ${{ steps.ci_token.outputs.token }}


      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python build backend
        run: python -m pip install --upgrade build

      - name: Install nim
        run: |
          set -euo pipefail

          wget https://nim-lang.org/download/nim-2.2.6.tar.xz
          tar xf nim-2.2.6.tar.xz
          pushd nim-2.2.6
          sh build.sh
          bin/nim c koch
          ./koch boot -d:release
          export PATH="$(pwd)/bin:${PATH}"
          popd

      - name: Get sqlite
        run: |
          set -euo pipefail

          wget https://sqlite.org/2025/sqlite-amalgamation-3500400.zip
          unzip sqlite-amalgamation-3500400.zip
          cp sqlite-amalgamation-3500400/sqlite3.c .

      - name: Install libssl and libbpf (Linux)
        if: ${{ matrix.target_os == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libbpf-dev libelf-dev

      - name: Install libssl (MacOS)
        if: ${{ matrix.target_os == 'macos' }}
        run: |
          git clone https://github.com/openssl/openssl
          pushd openssl
          git checkout openssl-3.5.4

          ./Configure --prefix=$(pwd)/../openssl-res
          make -j$(sysctl -n hw.ncpu)
          make install_sw

          popd

      - name: Install zlib (Linux)
        if: ${{ matrix.target_os == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev

      - name: Install zlib (MacOS)
        if: ${{ matrix.target_os == 'macos' }}
        run: |
          wget https://zlib.net/zlib-1.3.2.tar.gz
          tar xf zlib-1.3.2.tar.gz
          pushd zlib-1.3.2

          ./configure --static --prefix=$(pwd)/../zlib-res
          make -j$(sysctl -n hw.ncpu)
          make install

          popd

      - name: Build codetracer binaries (Linux)
        if: ${{ matrix.target_os == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail

          TARGET_DIR="build-python/src/ct/bin/${{ matrix.target_os }}-${{ matrix.arch }}"
          mkdir -p "${TARGET_DIR}"

          ./nim-2.2.6/bin/nim -d:release \
            --d:asyncBackend=asyncdispatch \
            --dynlibOverride:std -d:staticStd \
            --mm:refc --hints:on --warnings:off \
            --boundChecks:on \
            -d:useOpenssl3 \
            -d:ssl \
            -d:chronicles_sinks=json -d:chronicles_line_numbers=true \
            -d:chronicles_timestamps=UnixTime \
            -d:ctTest -d:testing --hint"[XDeclaredButNotUsed]":off \
            -d:builtWithNix \
            -d:ctEntrypoint \
            -d:pythonPackage \
            -d:libcPath=libc \
            -d:pathToNodeModules=../node_modules \
            --nimcache:nimcache \
            -d:staticSqlite \
            -d:useLibzipSrc \
            --passL:"-Wl,-Bstatic -L/usr/lib/x86_64-linux-gnu -l:libz.a -Wl,-Bdynamic" \
            --dynlibOverride:ssl --dynlibOverride:crypto \
            --passL:"-Wl,-Bstatic -L/usr/lib/x86_64-linux-gnu -l:libssl.a -l:libcrypto.a -Wl,-Bdynamic" \
            --out:"${TARGET_DIR}/ct" c ./src/ct/codetracer.nim

          ./nim-2.2.6/bin/nim \
            -d:release -d:asyncBackend=asyncdispatch \
            --mm:refc --hints:off --warnings:off \
            --debugInfo --lineDir:on \
            --boundChecks:on --stacktrace:on --linetrace:on \
            -d:chronicles_sinks=json -d:chronicles_line_numbers=true \
            -d:chronicles_timestamps=UnixTime \
            -d:ssl \
            -d:ctTest -d:testing --hint"[XDeclaredButNotUsed]":off \
            -d:libcPath=libc \
            -d:builtWithNix \
            -d:ctEntrypoint \
            -d:pythonPackage \
            --nimcache:nimcache \
            -d:staticSqlite \
            -d:useLibzipSrc \
            --passL:"-Wl,-Bstatic -L/usr/lib/x86_64-linux-gnu -l:libz.a -Wl,-Bdynamic" \
            --dynlibOverride:ssl --dynlibOverride:crypto \
            --passL:"-Wl,-Bstatic -L/usr/lib/x86_64-linux-gnu -l:libssl.a -l:libcrypto.a -Wl,-Bdynamic" \
            --out:"${TARGET_DIR}/db-backend-record" c ./src/ct/db_backend_record.nim

          ./build-python/scripts/download_ct_remote.sh \
            "${{ matrix.target_os }}" \
            "${{ matrix.arch }}" \
            "${TARGET_DIR}"

      - name: Build codetracer binaries (MacOS)
        if: ${{ matrix.target_os == 'macos' }}
        run: |
          set -euo pipefail

          TARGET_DIR="build-python/src/ct/bin/${{ matrix.target_os }}-${{ matrix.arch }}"
          mkdir -p "${TARGET_DIR}"

          ./nim-2.2.6/bin/nim -d:release \
            --d:asyncBackend=asyncdispatch \
            --dynlibOverride:std -d:staticStd \
            --mm:refc --hints:on --warnings:off \
            --boundChecks:on \
            -d:useOpenssl3 \
            -d:ssl \
            -d:chronicles_sinks=json -d:chronicles_line_numbers=true \
            -d:chronicles_timestamps=UnixTime \
            -d:ctTest -d:testing --hint"[XDeclaredButNotUsed]":off \
            -d:builtWithNix \
            -d:ctEntrypoint \
            -d:pythonPackage \
            -d:libcPath=libc \
            -d:pathToNodeModules=../node_modules \
            --nimcache:nimcache \
            -d:staticSqlite \
            -d:useLibzipSrc \
            --passL:"$(pwd)/zlib-res/lib/libz.a" \
            --dynlibOverride:ssl --dynlibOverride:crypto \
            --passL:"$(pwd)/openssl-res/lib/libssl.a $(pwd)/openssl-res/lib/libcrypto.a" \
            --out:"${TARGET_DIR}/ct" c ./src/ct/codetracer.nim

          ./nim-2.2.6/bin/nim \
            -d:release -d:asyncBackend=asyncdispatch \
            --mm:refc --hints:off --warnings:off \
            --debugInfo --lineDir:on \
            --boundChecks:on --stacktrace:on --linetrace:on \
            -d:chronicles_sinks=json -d:chronicles_line_numbers=true \
            -d:chronicles_timestamps=UnixTime \
            -d:ssl \
            -d:ctTest -d:testing --hint"[XDeclaredButNotUsed]":off \
            -d:libcPath=libc \
            -d:builtWithNix \
            -d:ctEntrypoint \
            -d:pythonPackage \
            --nimcache:nimcache \
            -d:staticSqlite \
            -d:useLibzipSrc \
            --passL:"$(pwd)/zlib-res/lib/libz.a" \
            --dynlibOverride:ssl --dynlibOverride:crypto \
            --passL:"$(pwd)/openssl-res/lib/libssl.a $(pwd)/openssl-res/lib/libcrypto.a" \
            --out:"${TARGET_DIR}/db-backend-record" c ./src/ct/db_backend_record.nim

          ./build-python/scripts/download_ct_remote.sh \
            "${{ matrix.target_os }}" \
            "${{ matrix.arch }}" \
            "${TARGET_DIR}"

      - name: Build wheel
        run: |
          set -euo pipefail

          pushd build-python
          python -m build --wheel -C--build-option=--plat-name=${{ matrix.plat_name }}
          popd

      - name: Upload distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-dist-${{ matrix.name }}
          path: build-python/dist/*.whl
          if-no-files-found: error

