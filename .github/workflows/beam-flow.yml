name: BEAM Materialized Trace DAP Flow

# Cross-repo CI for the BEAM (Elixir + Erlang) materialized trace flow.
# Runs the public DAP flow tests against pinned sibling SHAs of
# codetracer-beam-recorder and codetracer-trace-format using real clones,
# real recorder builds, real db-backend, and real DAP. No mocks, no skips.
#
# Replaces the legacy `elixir-flow-dap.yml` workflow during the BEAM rename
# migration window.

on:
  pull_request:
    paths:
      - 'src/db-backend/**'
      - 'libs/ct-dap-client/**'
      - 'ci/test/beam-flow-cross-repo.sh'
      - 'ci/test/elixir-flow-cross-repo.sh'
      - 'scripts/detect-siblings.sh'
      - 'justfile'
      - 'scripts/resolve-sibling-rev.sh'
      - '.github/workflows/beam-flow.yml'
  push:
    branches: [main]
    paths:
      - 'src/db-backend/**'
      - 'libs/ct-dap-client/**'
      - 'ci/test/beam-flow-cross-repo.sh'
      - 'ci/test/elixir-flow-cross-repo.sh'
      - 'scripts/detect-siblings.sh'
      - 'justfile'
      - 'scripts/resolve-sibling-rev.sh'
      - '.github/workflows/beam-flow.yml'
  workflow_dispatch:
    inputs:
      beam_recorder_ref:
        description: 'codetracer-beam-recorder ref (default: workspace lock)'
        required: false
        default: ''
      trace_format_ref:
        description: 'codetracer-trace-format ref (default: workspace lock)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  beam-flow-dap:
    runs-on: eph-linux-x64  # CIP-5: nix job → eph-linux-x64

    steps:
      - name: Checkout codetracer
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Setup dev env
        # setup-dev-env installs Nix (with the Attic substituter/keys) and
        # clones the cross-repo siblings adjacent to this checkout at the
        # workspace-lock-pinned revisions, replacing the former
        # Checkout-manifests / Resolve-lock / Resolve-refs / clone-repo
        # machinery. The beam_recorder_ref / trace_format_ref
        # workflow_dispatch inputs override the locked revisions (empty =>
        # lock). codetracer-trace-format is also cloned as a sibling here so
        # its workspace-locked SHA is available for the in-repo
        # libs/codetracer-trace-format swap below (the beam recorder reads
        # the in-repo path, not the sibling).
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.app-token.outputs.token }}
          substituters: ${{ vars.ATTIC_SUBSTITUTER }}
          trusted-public-keys: ${{ vars.ATTIC_TRUSTED_PUBLIC_KEY }}
          siblings: |
            codetracer-beam-recorder=${{ github.event.inputs.beam_recorder_ref }}
            codetracer-trace-format=${{ github.event.inputs.trace_format_ref }}

      - name: Swap libs/codetracer-trace-format for the pinned sibling clone
        # The beam recorder's trace shim reuses the shared CTFS writer at
        # the in-repo path libs/codetracer-trace-format. setup-dev-env
        # cloned codetracer-trace-format at the workspace-locked (or
        # dispatch-overridden) revision adjacent to this checkout; mirror
        # it into libs/ so the recorder build picks up the pinned source
        # instead of the submodule-pinned copy.
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ github.workspace }}/../codetracer-trace-format"
          DEST="${{ github.workspace }}/libs/codetracer-trace-format"
          rm -rf "$DEST"
          cp -a "$SRC" "$DEST"

      # Zero-test guard verification: prove that a non-existent test name
      # produces a "0 tests" cargo output and that the guard rejects it.
      # Runs first so a vacuous-pass regression in the harness is caught
      # before the real tests run.
      - name: Run zero-test guard verification
        run: |
          set -euo pipefail
          export TMPDIR="${{ github.workspace }}/../tmp"
          mkdir -p "$TMPDIR"
          export CODETRACER_BEAM_RECORDER_PATH="${{ github.workspace }}/../codetracer-beam-recorder"
          nix develop '.?submodules=1' --command \
            bash -lc './ci/test/beam-flow-cross-repo.sh verify_beam_flow_zero_test_guard'

      - name: Run BEAM (Elixir + Erlang) DAP flow integration
        run: |
          set -euo pipefail
          export TMPDIR="${{ github.workspace }}/../tmp"
          mkdir -p "$TMPDIR"
          export CODETRACER_BEAM_RECORDER_PATH="${{ github.workspace }}/../codetracer-beam-recorder"
          nix develop '.?submodules=1' --command \
            bash -lc 'just test-beam-flow'

      - name: Verify recorder binary discovery (sanity)
        if: always()
        run: |
          set -euo pipefail
          export CODETRACER_BEAM_RECORDER_PATH="${{ github.workspace }}/../codetracer-beam-recorder"
          for profile in debug release; do
            for binary_name in codetracer-beam-recorder codetracer-elixir-recorder; do
              candidate="$CODETRACER_BEAM_RECORDER_PATH/target/$profile/$binary_name"
              if [[ -x $candidate ]]; then
                echo "found recorder binary: $candidate"
                exit 0
              fi
            done
          done
          echo "ERROR: no codetracer-beam-recorder binary found under target/{debug,release}" >&2
          exit 1

      - name: Upload full BEAM flow logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beam-flow-dap-logs
          path: target/beam-flow-ci-logs/
          retention-days: 14
          if-no-files-found: ignore
