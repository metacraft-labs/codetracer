# ct_test routes process launch through the shared runner (runquota_process)
# in the runquota repo (see process_exec.nim). That source is not vendored
# under codetracer's libs/; in a workspace checkout it is the sibling repo,
# resolved relative to this file: src/ct_test -> repo root -> workspace root.
#
# These relative paths cover the common workspace layout
# (metacraft/codetracer/...). For layouts where the relative sibling does not
# resolve — a git worktree under .claude/worktrees/, or CI that only has the
# flake-pinned runquota source — config.nims (next to this file) adds the
# RUNQUOTA_SRC-based fallback paths, because Nim .cfg files cannot expand OS
# environment variables in --path values (only NimScript can, via getEnv).
# M1 (Incremental-Test-Runner): the CTFS seekable reader
# (incremental/ctfs_seekable.nim) reads the executed-function set in-process
# over codetracer-trace-format-nim's NewTraceReader instead of shelling out to
# `ct-print --json-events`.  That package is the sibling repo, resolved
# relative to this file: src/ct_test -> repo root -> workspace root ->
# codetracer-trace-format-nim/src.  config.nims (next to this file) adds a
# CODETRACER_TRACE_FORMAT_NIM_SRC env fallback for worktree / CI layouts where
# the relative sibling does not resolve (Nim .cfg cannot expand env vars).
--path:"../../../codetracer-trace-format-nim/src"

# M6b (Incremental-Test-Runner): the runner captures the read-file set for
# materialized-trace recorders (Python/Ruby/JS) by running the recorded process
# under the shared io-mon filesystem monitor (incremental/io_mon_capture.nim
# imports `io_mon`). io-mon is the sibling repo, resolved relative to this file
# (src/ct_test -> repo root -> workspace root -> io-mon/src), and it builds on
# nim-stackable-hooks (the interpose framework its `fs_snoop` driver imports).
# config.nims adds IO_MON_SRC / NIM_STACKABLE_HOOKS_SRC env fallbacks for
# worktree / CI layouts where the relative siblings do not resolve.
--path:"../../../io-mon/src"
--path:"../../../nim-stackable-hooks/src"

--path:"../../../runquota/libs/runquota_process/src"
--path:"../../../runquota/libs/runquota_core/src"
--path:"../../../runquota/libs/runquota_host/src"
--path:"../../../runquota/libs/runquota_host_macos/src"
--path:"../../../runquota/libs/runquota_host_linux/src"
--path:"../../../runquota/libs/runquota_host_windows/src"
--path:"../../../runquota/libs/runquota_codec/src"
--path:"../../../runquota/libs/runquota_protocol/src"
