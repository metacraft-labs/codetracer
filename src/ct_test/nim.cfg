# ct_test routes process launch through the shared runner (runquota_process)
# in the runquota repo (see process_exec.nim). That source is not vendored
# under codetracer's libs/; in a workspace checkout it is the sibling repo,
# resolved relative to this file: src/ct_test -> repo root -> workspace root.
#
# These relative paths cover the common workspace layout
# (metacraft/codetracer/...). For layouts where the relative sibling does not
# resolve — a git worktree under .claude/worktrees/, or CI that only has the
# flake-pinned runquota source — config.nims (next to this file) adds the
# RUNQUOTA_SRC-based fallback paths, because Nim .cfg files cannot expand OS
# environment variables in --path values (only NimScript can, via getEnv).
--path:"../../../runquota/libs/runquota_process/src"
--path:"../../../runquota/libs/runquota_core/src"
--path:"../../../runquota/libs/runquota_host/src"
--path:"../../../runquota/libs/runquota_host_macos/src"
--path:"../../../runquota/libs/runquota_host_linux/src"
--path:"../../../runquota/libs/runquota_host_windows/src"
--path:"../../../runquota/libs/runquota_codec/src"
--path:"../../../runquota/libs/runquota_protocol/src"
