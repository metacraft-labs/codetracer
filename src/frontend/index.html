<!doctype html>
<html>
    <head>
        <meta charset='utf-8'>
        <title>CodeTracer</title>

        <!--
          don't remove this: placeholder and default,
          later we use `loadTheme` in ui_js.nim to load the configured theme -->
        <link id='theme' rel='stylesheet' href='frontend/styles/default_dark_theme_electron.css'>

        <link rel='stylesheet' href='frontend/styles/loader.css'>

        <!-- 3rd party -->
        <link rel='stylesheet' href='public/third_party/font-awesome.min.css'>
        <link rel="stylesheet" href="public/third_party/vex.css" />
        <link rel="stylesheet" href="public/third_party/vex-theme-os.css" />

        <!-- golden layout css -->
        <link rel="stylesheet" href="public/third_party/golden-layout/dist/css/goldenlayout-base.css" type="text/css"/>
        <link rel="stylesheet" href="public/third_party/golden-layout/dist/css/themes/goldenlayout-light-theme.css" type="text/css"/>

        <link rel="stylesheet" href="public/third_party/jstree_default.css" type="text/css" />


        <link rel="stylesheet" href="public/third_party/bootstrap-4.3.1-dist/css/bootstrap.css" type="text/css" />
        <link rel="stylesheet" href="public/third_party/bootstrap-4.3.1-dist/css/bootstrap-grid.css" type="text/css" />


        <link rel="stylesheet" href="public/third_party/nouislider.css" type="text/css" />

        <!--file-icons-->
        <link rel="stylesheet" href="public/third_party/@exuanbo/file-icons-js/dist/css/file-icons.css" type="text/css" />
        <link rel="stylesheet" href="public/third_party/devicon-base.css" type="text/css" />

        <script>
          self.module = undefined
          self.process.browser = true

          window.electron = require('electron');

          inElectron = true
          loadScripts = true
      </script>

    </head>
    <body>
        <div id='menu' class='menu'>
        </div>
        <div id='isonim-debug-controls'>
        </div>
        <!-- IsoNim app shell: hidden by default, shown via ?isonim=1 URL param
             or -d:isoNimApp compile flag. Renders all panels from SessionViewModel
             signals using IsoNim instead of Karax. -->
        <div id='isonim-app' style='display: none;'>
        </div>
        <div id="session-tab-bar">
        </div>
        <div id='welcomeScreen'>

        </div>
        <div id='deepreview'>
        </div>
        <div id='root-container'>
          <!-- Auto-hide left strip + GL container + right strip in a flex row -->
          <div id="auto-hide-layout-row">
            <div id="auto-hide-strip-left"></div>
            <div id='ROOT'>
              <div id="context-menu-container" style="display: none;"></div>
              <div id='fixed-search'>
              </div>
              <div id="session-container-0" class="session-container">
                <section id="main">
                </section>
              </div>
            </div>
            <div id="auto-hide-strip-right"></div>
          </div>

          <!-- Auto-hide overlay: slide-in panel shown when a strip tab is clicked -->
          <div id="auto-hide-overlay">
            <div id="auto-hide-overlay-header">
              <span id="auto-hide-overlay-title"></span>
              <div class="auto-hide-overlay-header-buttons">
                <button id="auto-hide-overlay-unpin-btn" title="Unpin (restore to layout)">Unpin</button>
                <button id="auto-hide-overlay-close-btn" title="Close overlay">&#x2715;</button>
              </div>
            </div>
            <!-- Side-edge tabs + content in a flex row so tabs sit
                 between screen edge and panel content (VS Studio style) -->
            <div id="auto-hide-overlay-body" style="display:flex; flex:1; min-height:0; overflow:hidden;">
              <div id="auto-hide-overlay-side-tabs"></div>
              <div id="auto-hide-overlay-content"></div>
            </div>
          </div>

          <!-- Backdrop behind the overlay for click-to-dismiss -->
          <div id="auto-hide-backdrop"></div>

          <footer>
            <div id='search-results'>
            </div>
            <div id='status'>
            </div>
          </footer>
        </div>

        <!-- <script async id="__bs_script__" src="http://localhost:9700/browser-sync/browser-sync-client.js?v=2.28.3"></script> -->

        <script src="public/dist/frontend_bundle.js" type="text/javascript"> </script>
        <script src='public/third_party/jstree.min.js' type='text/javascript'></script>
        <script src='ui.js'></script>

    </body>
</html>
